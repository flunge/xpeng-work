  fusion_type: "sweep" # [sweep(default), ACMH]
  fusion_num_consistent: 4 # [default=4]
  fusion_num_neighbors: 50 # [default=50]
cross_trip_image_match_model: roma
est_plane_use_adaptive_offset: True
rome_cam_list_mode: 3