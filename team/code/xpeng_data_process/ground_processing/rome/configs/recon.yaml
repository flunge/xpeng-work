cut_range: 20
epochs: 9
eval: false
extrinsic:
  rotation_deg: 0.5
  start_epoch: 0
  translation_m: 0.5
image_height: 800
image_width: 800
laplacian_loss_weight: 1
lr:
  rotations: 0.01
  translations: 0.01
  vertices_label: 0.1
  vertices_rgb: 0.1
  vertices_z: 0.001
lr_gamma: 0.1
lr_milestones:
- 1
- 7
min_distance: 0.2
