# ============================================================================
# PARTIAL fine-tuning configuration for InSpatio-World-1.3B
# ----------------------------------------------------------------------------
# Trains only a chosen subset of DiT submodules (everything else frozen). A good
# middle ground between LoRA and full fine-tuning: more capacity than LoRA, far
# cheaper than full training. Tune `trainable_modules` to your needs.
#
# Run with:  CONFIG=configs/train_partial_1.3b.yaml bash scripts/train_lora.sh
# ============================================================================

model:
  # Folder holding InSpatio-World-1.3B/ and Wan2.1-T2V-1.3B/ subdirs.
  checkpoint_path: /workspace/group_share/adc-sim/users/cloudsim/models/inspatio-world/checkpoints
  # Override path to the InSpatio-World safetensors.
  # null -> <checkpoint_path>/InSpatio-World-1.3B/InSpatio-World-1.3B.safetensors
  inspatio_ckpt: /workspace/yangxh7@xiaopeng.com/codes/3dgs/models/inspatio-world/output/partial_run/partial_20260623_114542/partial_final.safetensors
  # Pipeline/model structure config used during training. Keeping it here makes
  # the training YAML fully self-contained (no hidden dependency on inference YAML).
  pipeline:
    denoising_step_list: [1000, 750, 500, 250]
    warp_denoising_step: true
    num_train_timestep: 1000
    timestep_shift: 5.0
    guidance_scale: 3.0
    negative_prompt: "blurry, low quality, worst quality, ugly, deformed, watermark, text, static"
    num_frame_per_block: 3
    wan_model_folder: "Wan2.1-T2V-1.3B"
    generator:
      model_name: Wan2.1-T2V-1.3B
      in_dim: 36
      weight_list:
        - path: "Wan2.1-T2V-1.3B"
          switch_name: true
      filter_list:
        - "img_emb."
        - "cross_attn.k_img"
        - "cross_attn.v_img"
        - "cross_attn.norm_k_img"
        - "patch_embedding"

data:
  # JSON list of {target_path, render_path, ref_path?, text?}.
  metadata: ./data/train_metadata.json
  # Optional prefix prepended to relative paths in metadata.
  base_path: ""
  # Fraction of metadata held out as validation set (split in code, no separate file needed).
  # e.g. 0.1 = 10 % val, remaining 90 % train.  Set 0 to disable validation.
  val_split: 0.001
  repeat: 1
  # Pixel frames sampled per clip (45 -> 12 latent frames).
  num_frames: 45
  target_fps: 6
  # Random temporal shift applied only to ref/source_video, in seconds.
  # Example: 5 -> sample ref from within [-5s, +5s] around target timestamp.
  ref_time_shift_seconds: 3.0
  random_ref_shift: true
  height: 480
  width: 832
  num_workers: 4
  # Keep DataLoader workers alive across epochs instead of respawning them every epoch.
  # The dataset is small (many short epochs), so respawning paid the worker cold-start
  # cost dozens of times overnight; this removes that. Only used when num_workers > 0.
  persistent_workers: true
  # Batches each worker stages ahead, so the GPU is less likely to stall waiting on data
  # (the overnight run was input-bound, data_wait up to ~59%). Only used when num_workers > 0.
  prefetch_factor: 4
  # --- Offline latent cache (opt-in throughput optimization) -----------------
  # When true, the train loader reads VAE-encoded latents from disk instead of decoding
  # videos + running the frozen VAE every step (the overnight timing showed vae_encode at
  # ~5-6s, up to ~50% of each step). Build the cache first with:
  #   python tools/precompute_latents.py --config <this.yaml> --out ./data/latent_cache
  # Tradeoff: the random crop / ref shift is frozen into the cache (use --num-crops>1 for
  # more diversity), and validation switches to a single cached curve (no shift0/shift4).
  use_latent_cache: false
  latent_cache_index: null   # e.g. ./data/latent_cache/index.json (required if the above is true)
  # Clips per optimizer step (training only; validation always uses 1 for comparable
  # loss). With per_block_backward only one block's activations are resident, so spare
  # GPU memory (e.g. <40% at batch_size=1) can be spent on a larger batch to raise GPU
  # utilization and throughput. Effective batch = batch_size * gradient_accumulation_steps.
  batch_size: 1

lora:
  rank: 32
  # null -> defaults to rank.
  alpha: null
  target_modules: "q,k,v,o,ffn.0,ffn.2"
  # Resume LoRA weights from a .safetensors file (null to start fresh).
  checkpoint: null
  # Keep LoRA params in fp32 for extra training stability.
  upcast: true

train:
  # Training mode:
  #   lora    -> train low-rank adapters only (uses the `lora:` section).
  #   full    -> fine-tune the whole DiT (optionally keep `freeze_modules` fixed).
  #   partial -> fine-tune only the submodules listed in `trainable_modules`.
  mode: partial
  # For mode=partial: comma-separated substrings of DiT parameter names to train,
  # e.g. "blocks,head" or "patch_embedding,blocks.0,blocks.1".
  # Substrings matched against DiT parameter names. Examples:
  #   "ffn"                 -> all feed-forward blocks
  #   "self_attn,cross_attn"-> all attention projections
  #   "blocks.20,blocks.21,blocks.22,blocks.23,blocks.24,blocks.25,blocks.26,blocks.27,blocks.28,blocks.29,head"
  #                          -> last 10 transformer blocks + output head
  trainable_modules: "self_attn,cross_attn,ffn,head"
  # For mode=full: comma-separated substrings to KEEP frozen (e.g. "patch_embedding").
  freeze_modules: ""
  # Resume trainable weights (full/partial) from a .safetensors file (null = fresh).
  resume: null
  learning_rate: 1.0e-4  
  weight_decay: 1.0e-2
  num_epochs: 1000
  # Stop after this many optimizer steps (overrides num_epochs when > 0).
  max_steps: -1
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  warmup_steps: 0
  # For mode=full/partial: keep trainable params as fp32 master weights so AdamW
  # updates don't underflow under bf16 autocast (mirrors lora.upcast). Set false
  # to train directly in bf16 (less memory, but risk of update underflow).
  upcast: true
  # Back-propagate each causal block's loss immediately and free its graph before the
  # next block, instead of summing all blocks and doing one backward. Mathematically
  # identical gradients, but only ONE block's activations stay resident (removes the
  # ~num_blocks memory multiplier). This is what lets gradient_checkpointing be off.
  per_block_backward: false
  # Probability (0..1) of training a clip WITHOUT the reference/source view.
  # The ref view is injected ONLY through the per-block KV cache, alongside the previous
  # block's latents (the chunk history). A "no-ref" clip drops just the ref part of that
  # context but KEEPS the previous-block history, so temporal continuity across chunks is
  # preserved; only block 0 (whose sole context was the ref) becomes pure self-attention.
  # The 3DGS render + coverage mask (channel-wise) and the text prompt (cross-attention)
  # still apply. Randomly dropping the ref for a fraction of clips weakens the model's
  # reliance on the ref image (use when outputs follow the ref too closely instead of the
  # render/input). 0.0 = always use the ref; 1.0 = never use the ref; e.g. 0.5 trains
  # ~50% of clips without the ref. Validation always uses the ref so val loss stays
  # comparable across runs.
  no_ref_prob: 0.5
  # With per_block_backward=true, one block's activations fit comfortably in 80G, so
  # checkpointing (which re-runs the forward during backward, ~30% slower) can be off.
  # If you ever disable per_block_backward, turn this back on to avoid OOM.
  gradient_checkpointing: true
  seed: 42
  # NCCL collective timeout (minutes). The 10-min default watchdog can fire when ranks
  # drift out of lockstep during validation / data loading / checkpoint saves; raise it
  # so transient stragglers don't abort the whole multi-node job.
  ddp_timeout_minutes: 30
  # ctx_forward / denoise_forward / backward), sorted by cost with % share, so you can
  # see which phase dominates. Adds a few cuda.synchronize() per step (negligible vs a
  # ~170s step). Set false once you've identified the bottleneck.
  profile_timing: true


output:
  path: ./output/partial_run
  # Optional subfolder name for this training run. null -> auto timestamped name,
  # e.g. lora_20260616_153045.
  run_name: resume
  save_steps: 5000  # 500 有点太高了
  log_steps: 2
  # Validation cadence in optimizer steps, decoupled from log_steps. Validation is the
  # main cross-rank straggler; validate less often than you log. null -> = log_steps.
  val_steps: 100

debug:
  # Set enabled=true to run a quick debug pass
  enabled: false
  # Maximum number of optimizer steps in debug mode.
  num_steps: 2
  # Number of unique training samples to use in debug mode.
  num_samples: 2
  # Output directory for debug run (relative to output.path).
  save_dir: debug
