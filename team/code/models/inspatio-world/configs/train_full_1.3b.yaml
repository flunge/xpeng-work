# ============================================================================
# FULL fine-tuning configuration for InSpatio-World-1.3B
# ----------------------------------------------------------------------------
# Trains the entire DiT (~1.3B params). Recommended only with a large dataset
# (roughly >= 1k clips) and enough VRAM (single 80GB GPU, or multi-GPU / offload).
#
# Run with:  CONFIG=configs/train_full_1.3b.yaml bash scripts/train_lora.sh
# ============================================================================

model:
  checkpoint_path: /workspace/group_share/adc-sim/users/cloudsim/models/inspatio-world/checkpoints
  inspatio_ckpt: null
  # Pipeline/model structure config used during training. Keeping it here makes
  # the training YAML fully self-contained (no hidden dependency on inference YAML).
  pipeline:
    denoising_step_list: [1000, 750, 500, 250]
    warp_denoising_step: true
    num_train_timestep: 1000
    timestep_shift: 5.0
    guidance_scale: 3.0
    negative_prompt: "blurry, low quality, worst quality, ugly, deformed, watermark, text, static"
    num_frame_per_block: 3
    wan_model_folder: "Wan2.1-T2V-1.3B"
    generator:
      model_name: Wan2.1-T2V-1.3B
      in_dim: 36
      weight_list:
        - path: "Wan2.1-T2V-1.3B"
          switch_name: true
      filter_list:
        - "img_emb."
        - "cross_attn.k_img"
        - "cross_attn.v_img"
        - "cross_attn.norm_k_img"
        - "patch_embedding"

data:
  metadata: /workspace/group_share/adc-sim/users/cloudsim/models/inspatio-world/data/train_metadata.json
  base_path: ""
  repeat: 1
  num_frames: 45
  target_fps: 6
  # Random temporal shift applied only to ref/source_video, in seconds.
  # Example: 5 -> sample ref from within [-5s, +5s] around target timestamp.
  ref_time_shift_seconds: 0
  height: 480
  width: 832
  num_workers: 2
  # Keep DataLoader workers alive across epochs (only used when num_workers > 0).
  persistent_workers: true
  # Batches each worker stages ahead to reduce GPU data stalls (only when num_workers > 0).
  prefetch_factor: 4
  # --- Offline latent cache (opt-in). Build with scripts/precompute_latents.py, then set
  # use_latent_cache: true and point latent_cache_index at the produced index.json. Skips
  # the per-step VAE encode / video decode. See train_lora_1.3b.yaml for the full notes.
  use_latent_cache: false
  latent_cache_index: null

train:
  mode: full
  # Keep the VAE-aligned input projection fixed by default (it was trained to map
  # the 36-channel render/mask conditioning). Set to "" to also train it.
  freeze_modules: "patch_embedding"
  trainable_modules: ""
  resume: null
  # Full fine-tuning needs a much smaller LR than LoRA to avoid catastrophic drift.
  learning_rate: 1.0e-5
  weight_decay: 1.0e-2
  num_epochs: 5
  max_steps: -1
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  warmup_steps: 200
  gradient_checkpointing: true
  seed: 42
  # NCCL collective timeout (minutes). The 10-min default watchdog can fire when ranks
  # drift out of lockstep during validation / data loading / checkpoint saves; raise it
  # so transient stragglers don't abort the whole multi-node job.
  ddp_timeout_minutes: 30

# `lora:` is unused in full mode but kept so shared tooling can read the file.
lora:
  rank: 32
  alpha: null
  target_modules: "q,k,v,o,ffn.0,ffn.2"
  checkpoint: null
  upcast: false

output:
  path: ./output/full_run
  save_steps: 500
  log_steps: 10
  # Validation cadence in optimizer steps, decoupled from log_steps. Validation is the
  # main cross-rank straggler; validate less often than you log. null -> = log_steps.
  val_steps: 100

debug:
  enabled: false
  num_steps: 2
  num_samples: 2
  save_dir: debug
