# 过拟合配置（小数据、多 epoch、带 resume）
# 使用: 在 deploy/run 中指定 config=overfit

description: "过拟合单场景，少量数据、多 epoch、从 checkpoint resume"

# 运行环境与路径（占位符 ${WORKSPACE}/${TRAIN_ROOT}/${VERSION} 会据此替换）
workspace: "/workspace/yangxh7@xiaopeng.com"
version: "v1"
train_root: "c-855"

output_dir: "${WORKSPACE}/difix3D_train/${TRAIN_ROOT}/${VERSION}"
dataset_path: "${WORKSPACE}/difix3D_train/${TRAIN_ROOT}/output_dataset_interval2.json"
resume: "${WORKSPACE}/difix3D_train/train_v1/v1_4gpu/checkpoints_epoch_0014_step_42000/"

image_height: 576
image_width: 1024
lora_rank_vae: 4
timestep: 199

lambda_lpips: 0.1
lambda_l2: 1.0
lambda_gram: 0.1
gram_loss_warmup_steps: 999999999999

eval_freq: 100000000
num_samples_eval: 1
viz_freq: 500
train_batch_size: 2
num_training_epochs: 500
checkpointing_epoch: 20
gradient_accumulation_steps: 1
max_steps_per_epoch: 4000
learning_rate: 5.0e-5
lr_scheduler: "constant"
dataloader_num_workers: 4

gradient_checkpointing: true
enable_xformers_memory_efficient_attention: true
set_grads_to_none: true
