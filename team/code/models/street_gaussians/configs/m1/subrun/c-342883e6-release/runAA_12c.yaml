    include_sky: true
    opt_track: true

train:
  iterations: 100100
  test_iterations: [50000, 100000]
  save_iterations: [100000]
  checkpoint_iterations: [100000]

optim:
  prune_box_interval: 100
  densification_interval: 100
  densify_from_iter: 1000
  densify_grad_threshold_bkgd: 0.0006
  densify_grad_abs_bkgd: True
  densify_grad_threshold_obj: 0.0002
  densify_grad_abs_obj: False
  densify_grad_threshold: 0.0002
  densify_until_iter: 50000
  feature_lr: 0.0025
  max_screen_size: 20
  min_opacity: 0.005
  min_opacity_bkgd: 0.02
  opacity_lr: 0.05
  opacity_reset_interval: 3000
  percent_big_ws: 0.1
  percent_dense: 0.01
  position_lr_delay_mult: 0.01
  position_lr_final: 1.6e-06
  position_lr_init: 0.00016
  position_lr_max_steps: 80000
  rotation_lr: 0.001
  scaling_lr: 0.005
  semantic_lr: 0.01

  lambda_l1: 0.5
  lambda_dssim: 0.8
  lambda_sky: 0.05
  lambda_sky_scale: []
  lambda_mask: 0.1
  lambda_reg: 0.1
  lambda_depth_lidar: 0.1
  lambda_normal_lidar: 0.
  lambda_ground_flatten: 1000.
  lambda_ground_symmetry: 10000.
  lambda_ground_acc: 1.
  squeeze_grd_gs: true

  track_position_lr_delay_mult: 0.01
  track_position_lr_init: 0.005
  track_position_lr_final: 5.0e-5
  track_position_max_steps: 60000

  track_rotation_lr_delay_mult: 0.01
  track_rotation_lr_init: 0.001
  track_rotation_lr_final: 1.0e-5
  track_rotation_max_steps: 60000

render:
  fps: 10
  save_image: false
  save_video: true
  save_video_merged: true
  concat_cameras: []
