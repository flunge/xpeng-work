task: m1/fm_fixed/c-10ce0565-release
source_path: /workspace/yangxh7@xiaopeng.com/datasets/xpeng/fm_fixed/c-10ce0565-ffaf-378d-bd9c-845893333d1d
exp_name: runH_8d
mode: train
loaded_iter: -1
dilate_mask: 40

data:
  split_test: -1
  split_train: 1
  type: Xpeng
  white_background: false
  selected_frames: []  # 110
  cameras: [1,3,4,7]
  extent: 10
  use_colmap: true
  filter_colmap: true
  resolution: 1
  write_obj_bound: false
  use_lidar_normal: false
  use_lidar_slice_depth: false
  use_cam2_extended_l1mask: [1070, 200]
  input_ground_downsample: 0.03

model:
  gaussian:
    sh_degree: 1
    fourier_dim: 5
    fourier_scale: 1.
    flip_prob: 0.5
    use_tracklets_world: false
  nsg:
    include_bkgd: true
    include_ground: true
    include_obj: false
    include_sky: true
    opt_track: true

train_xpeng:
  iterations_ground: 30000
  iterations_streetgaussian: 50000
  prune_until_iter: 30000
  prune_from_iter: 2000
  phase1_only_cam2: false
  phase1_exclude_obj_bound: true
  phase2_include_obj_bound: true
  phase2_no_ground: true
  phase2_ground_only_opacity: false
train:
  iterations: 80000
  test_iterations: [80000]
  save_iterations: [80000]
  checkpoint_iterations: [80000]

optim:
  prune_box_interval: 100
  densification_interval: 100
  densify_from_iter: 1500
  densify_grad_threshold_bkgd: 0.0006
  densify_grad_abs_bkgd: True
  densify_grad_threshold_obj: 0.0002
  densify_grad_abs_obj: False
  densify_grad_threshold: 0.0002
  densify_until_iter: 30000
  feature_lr: 0.0025
  max_screen_size: 20
  min_opacity: 0.005
  min_opacity_bkgd: 0.02
  min_opacity_grd: 0.02
  opacity_lr: 0.05
  opacity_reset_interval: 3000
  percent_big_ws: 0.1
  percent_dense: 0.01
  position_lr_delay_mult: 0.01
  position_lr_final: 1.6e-06
  position_lr_init: 0.00016
  position_lr_final_obj: 1.6e-06
  position_lr_init_obj: 0.00016
  position_lr_max_steps: 60000
  rotation_lr: 0.001
  scaling_lr: 0.005
  semantic_lr: 0.01

  lambda_l1: 0.5
  lambda_dssim: 0.8
  lambda_sky: 0.05
  lambda_sky_scale: []
  lambda_mask: 0.1
  lambda_reg: 0.1
  lambda_depth_lidar: 0.1
  lambda_depth_weight_sigma: 0.1

  lambda_background_init_lidar_constraint: [0.2, 25, 70000, 75000]
  lambda_background_on_ground_penalty: 0.
  lambda_background_maxscale: [0., 0.2]
  lambda_object_maxscale: [0., 0.2]

  lambda_ground_acc: 1.
  lambda_novel_ground_acc: 10.
  lambda_ground_flatten: 1000.
  lambda_ground_symmetry: 10000.
  lambda_ground_flatten_phase2: 0.
  lambda_ground_symmetry_phase2: 0.

  track_position_lr_delay_mult: 0.01
  track_position_lr_init: 0.005
  track_position_lr_final: 5.0e-5
  track_position_max_steps: 60000

  track_rotation_lr_delay_mult: 0.01
  track_rotation_lr_init: 0.001
  track_rotation_lr_final: 1.0e-5
  track_rotation_max_steps: 60000

render:
  fps: 10
  save_image: false
  save_video: true
  save_video_merged: true
  concat_cameras: []
