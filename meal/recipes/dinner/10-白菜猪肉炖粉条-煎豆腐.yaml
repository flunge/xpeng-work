title: "白菜猪肉炖粉条 + 煎豆腐"
type: dinner
difficulty: easy
total_time: "35分钟"
servings: 4
tools: [炖锅, 不粘煎锅, 电饭煲]
series: "炖菜+煎菜"
tags: [猪肉, 白菜, 粉丝, 暖身, 家常]
ingredient_tags: ['猪肉', '白菜', '豆腐']
ingredients:
  白菜猪肉炖粉条:
    - name: 五花肉片
      amount: 300g
      note: 切薄片
    - name: 大白菜
      amount: ½颗
      note: 约400g，菜帮切条、菜叶撕块
    - name: 红薯粉条
      amount: 1把
      note: 温水泡软，约80g
    - name: 姜
      amount: 3片
    - name: 宝宝酱油
      amount: 2大勺
    - name: 蚝油
      amount: 1小勺
    - name: 糖
      amount: 少许
    - name: 葱花
      amount: 少许
    - name: 水
      amount: 适量
  煎豆腐:
    - name: 老豆腐
      amount: 1块
      note: 约400g，切厚片
    - name: 盐
      amount: 少许
    - name: 葱花
      amount: 少许
  主食:
    - name: 大米
      amount: 2杯
steps:
  - step: "五花肉切薄片，白菜菜帮切条、菜叶撕大片"
  - step: "红薯粉条温水泡软（约15分钟），沥干备用"
  - step: "炖锅加少许油，放入五花肉片煎至两面微焦出油"
    tool: 炖锅
  - step: "加入姜片和白菜帮翻炒至变软，再加入菜叶翻炒"
    tool: 炖锅
  - step: "加入酱油、蚝油、糖，翻炒均匀"
    tool: 炖锅
  - step: "加入泡好的粉条和适量开水（约没过食材的一半）"
    tool: 炖锅
  - step: "盖上锅盖，中小火炖10分钟至白菜出汁、粉条软糯"
    tool: 炖锅
  - step: "开盖大火收汁至汤汁浓稠，撒葱花"
  - step: "同时不粘锅刷薄油，放入豆腐厚片，中小火煎至两面金黄（每面约3-4分钟）"
    tool: 不粘煎锅
  - step: "撒少许盐和葱花"
  - step: "和米饭一起上桌"
night_prep:
  - "五花肉切薄片，冷藏"
  - "白菜洗净，菜帮切条、菜叶撕块，分开放入保鲜盒冷藏"
  - "粉条温水泡软后沥干，剪成短段冷藏"
  - "老豆腐切厚片，泡在淡盐水中冷藏（煎之前取出沥干）"
notes: "东北家常菜，虽然看起来朴实，但五花肉的油和白菜的甜融合在一起，炖出来的汤拌饭是绝配。选三层肥瘦相间的五花肉，煸出油后不腻。豆腐煎到两面焦黄，直接吃或蘸酱都行。"
