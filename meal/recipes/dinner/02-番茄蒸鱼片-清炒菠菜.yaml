title: "番茄蒸鱼片 + 清炒菠菜"
type: dinner
difficulty: medium
total_time: "30分钟"
servings: 4
tools: [蒸锅, 炒锅]
series: "蒸菜+蔬菜"
tags: [鱼肉, 番茄, 蔬菜, 蒸]
ingredient_tags: ['番茄', '鱼', '菠菜']
ingredients:
  番茄蒸鱼片:
    - name: 巴沙鱼片或鲈鱼
      amount: 400g
      note: 巴沙鱼无刺，更适合孩子
    - name: 番茄
      amount: 1个
      note: 切片
    - name: 姜
      amount: 4-5片
      note: 切丝
    - name: 小葱
      amount: 2根
      note: 切段
    - name: 宝宝酱油
      amount: 1大勺
    - name: 蒸鱼豉油
      amount: 1小勺
    - name: 香油
      amount: 几滴
  清炒菠菜:
    - name: 菠菜
      amount: 300g
    - name: 蒜
      amount: 2瓣
      note: 切末
    - name: 盐
      amount: 少许
  主食:
    - name: 大米
      amount: 2杯
steps:
  - step: "巴沙鱼片解冻后切片，用厨房纸吸干水分"
  - step: "鱼片加入姜丝、酱油、少许油拌匀腌制10分钟"
  - step: "盘中铺上番茄片，放上腌好的鱼片，撒上葱段"
  - step: "蒸锅水开后放入鱼盘，大火蒸8-10分钟"
    tool: 蒸锅
  - step: "取出后淋上蒸鱼豉油和香油"
  - step: "同时煮米饭"
    tool: 电饭煲
  - step: "菠菜洗净切段"
  - step: "炒锅倒少许油，下蒜末炒香"
    tool: 炒锅
  - step: "放入菠菜大火快炒至变软，加盐调味即可"
    tool: 炒锅
night_prep:
  - "巴沙鱼片解冻后切片，和姜丝、酱油拌匀冷藏腌制"
  - "番茄切片，放入保鲜盒冷藏"
  - "菠菜洗净沥干"
  - "蒜切末"
notes: "巴沙鱼没有刺，最适合给小朋友吃。如果换鲈鱼要仔细挑刺。番茄铺底蒸出的汤汁可以拌饭，孩子喜欢。"
