title: "一锅鲜虾豆腐煲 + 奶香小馒头"
type: dinner
difficulty: medium
total_time: "35分钟"
servings: 4
tools: [炖锅, 玻璃锅]
series: "煲+主食"
tags: [虾仁, 豆腐, 粉丝, 鲜香]
ingredient_tags: ['虾', '豆腐', '娃娃菜', '黄瓜']
ingredients:
  鲜虾豆腐煲:
    - name: 大虾
      amount: 16只
      note: 去头开背去虾线，虾头留用
    - name: 嫩豆腐
      amount: 1盒
      note: 约300g，切厚块
    - name: 娃娃菜
      amount: 1颗
      note: 切大段
    - name: 粉丝
      amount: 1把
      note: 温水泡软
    - name: 姜
      amount: 4-5片
    - name: 小葱
      amount: 2根
      note: 切段
    - name: 宝宝酱油
      amount: 1大勺
    - name: 蚝油
      amount: 1小勺
    - name: 白胡椒粉
      amount: 少许
    - name: 香油
      amount: 几滴
  搭配:
    - name: 速冻奶香小馒头
      amount: 8个
  凉拌黄瓜:
    - name: 黄瓜
      amount: 2根
      note: 拍碎切段
    - name: 蒜
      amount: 2瓣
    - name: 生抽
      amount: 1小勺
    - name: 香醋
      amount: 1小勺
    - name: 香油
      amount: 几滴
steps:
  - step: "大虾去头去壳留尾，开背去虾线。虾头洗净沥干备用，虾仁用少许盐和白胡椒粉腌制"
  - step: "锅中倒少许油，放入姜片和虾头，中小火煎出虾油（用铲子按压虾头）"
    tool: 炖锅
  - step: "待油变红、香气出来，加入足量开水（约800ml），大火煮3分钟至汤色红亮"
    tool: 炖锅
  - step: "捞出虾头和姜片弃用，留下虾汤"
    tool: 炖锅
  - step: "汤中铺入娃娃菜段、泡软的粉丝、豆腐块"
    tool: 炖锅
  - step: "加酱油和蚝油调味，煮开后转中火煮5分钟"
    tool: 炖锅
  - step: "放入虾仁，煮至变红即关火（约1-2分钟，不要煮老）"
    tool: 炖锅
  - step: "撒葱段，淋几滴香油"
  - step: "黄瓜拍碎切段，加蒜末、生抽、香醋、香油拌匀"
  - step: "蒸锅水开后放入小馒头蒸8-10分钟"
    tool: 蒸锅
night_prep:
  - "大虾去壳开背去虾线，虾头单独保留，分别放冷藏"
  - "娃娃菜洗净切大段，粉丝温水泡软沥干"
  - "嫩豆腐切块泡在水中冷藏"
  - "黄瓜洗净，姜切片，小葱切段，蒜切末"
notes: "虾头煎出的虾油是这锅汤的灵魂，颜色红亮、鲜味十足，孩子喝汤吃面都很喜欢。粉丝泡太久会烂，泡软即可。嫩豆腐要用锅铲轻推，别搅碎了。"
