title: "豆豉蒸排骨（不辣版）+ 清炒菜心"
type: dinner
difficulty: medium
total_time: "40分钟（含腌制时间）"
servings: 4
tools: [蒸锅, 炒锅, 电饭煲]
series: "蒸菜+蔬菜"
tags: [排骨, 豆豉, 蒸, 经典粤菜]
ingredient_tags: ['排骨', '菜心']
ingredients:
  豆豉蒸排骨:
    - name: 猪肋排
      amount: 500g
      note: 斩小段，约3cm长
    - name: 干豆豉
      amount: 1大勺
      note: 切碎，选阳江豆豉
    - name: 蒜
      amount: 3瓣
      note: 切末
    - name: 姜
      amount: 3片
      note: 切丝
    - name: 宝宝酱油
      amount: 1大勺
    - name: 蚝油
      amount: 1小勺
    - name: 糖
      amount: 1小勺
    - name: 玉米淀粉
      amount: 1大勺
    - name: 香油
      amount: 几滴
    - name: 葱花
      amount: 少许
  清炒菜心:
    - name: 菜心
      amount: 300g
    - name: 蒜
      amount: 2瓣
      note: 切片
    - name: 盐
      amount: 少许
  主食:
    - name: 大米
      amount: 2杯
steps:
  - step: "排骨斩小段，冷水浸泡30分钟去血水，中途换一次水"
  - step: "捞出排骨沥干水分，用厨房纸吸干"
  - step: "豆豉切碎，蒜切末，姜切丝"
  - step: "排骨加豆豉碎、蒜末、姜丝、酱油、蚝油、糖、淀粉、香油拌匀"
  - step: "腌制20分钟（可提前一晚冷藏腌制）"
  - step: "将腌好的排骨平铺在盘中，不要重叠"
  - step: "蒸锅水开后放入排骨，大火蒸15-18分钟至排骨熟透"
    tool: 蒸锅
  - step: "蒸好后撒葱花"
  - step: "同时电饭煲煮米饭"
    tool: 电饭煲
  - step: "菜心洗净，切掉老根部"
  - step: "炒锅加少许油，下蒜片爆香"
    tool: 炒锅
  - step: "放入菜心，大火快速翻炒至颜色变深绿（约1-2分钟）"
    tool: 炒锅
  - step: "加少许盐调味即可出锅"
    tool: 炒锅
night_prep:
  - "排骨斩段，冷水浸泡去血水后沥干，加所有腌料拌匀，密封冷藏腌制过夜"
  - "菜心洗净沥干"
  - "蒜切片，姜切丝"
notes: "豆豉蒸排骨是经典粤式蒸菜，排骨嫩滑多汁、豉香浓郁。豆豉本身有咸味，酱油要少放。选肋排部位，肥瘦相间蒸出来最嫩。排骨要铺开蒸，不要堆在一起，受热才均匀。"
