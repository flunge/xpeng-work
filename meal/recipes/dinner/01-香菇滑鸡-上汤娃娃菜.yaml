title: "电饭煲香菇滑鸡 + 上汤娃娃菜"
type: dinner
difficulty: medium
total_time: "45分钟（含腌制时间）"
servings: 4
tools: [电饭煲, 炒锅]
series: "蒸菜+蔬菜"
tags: [鸡肉, 菌菇, 蔬菜, 蒸]
ingredient_tags: ['鸡肉', '香菇', '娃娃菜']
ingredients:
  香菇滑鸡:
    - name: 大鸡腿
      amount: 3个
      note: 去骨切块，约400g
    - name: 干香菇
      amount: 8朵
      note: 温水泡发
    - name: 姜
      amount: 4-5片
      note: 切丝
    - name: 宝宝酱油
      amount: 1大勺
    - name: 蚝油
      amount: 1大勺
    - name: 淀粉
      amount: 1大勺
    - name: 香油
      amount: 几滴
    - name: 葱花
      amount: 少许
      note: 出锅装饰
  上汤娃娃菜:
    - name: 娃娃菜
      amount: 2颗
      note: 对半切开
    - name: 瘦肉末
      amount: 30g
      note: 代替火腿丁提鲜，可用猪肉或鸡肉
    - name: 皮蛋
      amount: 1个
      optional: true
    - name: 蒜
      amount: 3瓣
      note: 切末
    - name: 盐
      amount: 少许
  主食:
    - name: 大米
      amount: 2杯
steps:
  - step: "干香菇温水泡发后切块（泡香菇水留用）"
  - step: "鸡腿肉去骨切块，加入姜丝、香菇块、酱油、蚝油、淀粉、香油和2勺泡香菇水，拌匀腌制20分钟"
  - step: "大米淘洗，放入电饭煲，加适量水"
  - step: "将腌制好的香菇鸡放入浅盘，架在电饭煲自带的蒸格（蒸笼配件）上，盖在米饭上方"
    tool: 电饭煲
  - step: "按下煮饭键，饭好菜也熟了"
    tool: 电饭煲
  - step: "锅中倒少许油，下蒜末和肉末炒香"
    tool: 炒锅
  - step: "加一碗水烧开，放入皮蛋丁和娃娃菜"
    tool: 炒锅
  - step: "煮至娃娃菜变软，加少许盐调味"
    tool: 炒锅
  - step: "米饭盛碗，香菇滑鸡撒葱花，搭配上汤娃娃菜"
night_prep:
  - "干香菇温水泡发后切块，冷藏"
  - "鸡腿去骨切块，和腌料拌匀冷藏（腌制过夜更入味）"
  - "娃娃菜洗净对半切开，沥干"
  - "肉末备好，蒜切末"
notes: "鸡腿肉比鸡胸肉更嫩，适合孩子吃。香菇鸡可以放电饭煲蒸格和米饭一起蒸熟，省时省力。若电饭煲没有蒸格配件，可改用蒸锅单独蒸香菇鸡约20分钟，米饭另用电饭煲煮。"
