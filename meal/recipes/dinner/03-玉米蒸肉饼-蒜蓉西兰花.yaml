title: "玉米蒸肉饼 + 蒜蓉西兰花"
type: dinner
difficulty: easy
total_time: "35分钟"
servings: 4
tools: [电饭煲, 蒸锅, 炒锅]
series: "蒸菜+蔬菜"
tags: [猪肉, 玉米, 蔬菜, 蒸]
ingredient_tags: ['猪肉', '玉米', '胡萝卜', '西兰花']
ingredients:
  玉米蒸肉饼:
    - name: 猪梅花肉
      amount: 300g
      note: 剁成肉末或用料理机打碎
    - name: 甜玉米粒
      amount: 小半碗
    - name: 胡萝卜
      amount: 半根
      note: 切碎末
    - name: 宝宝酱油
      amount: 1大勺
    - name: 淀粉
      amount: 1大勺
    - name: 姜末
      amount: 少许
    - name: 葱花
      amount: 少许
  蒜蓉西兰花:
    - name: 西兰花
      amount: 1颗
      note: 切小朵
    - name: 蒜
      amount: 3瓣
      note: 切末
    - name: 盐
      amount: 少许
  主食:
    - name: 大米
      amount: 2杯
steps:
  - step: "肉末中加入玉米粒、胡萝卜碎、酱油、淀粉、姜末，顺时针搅拌上劲"
  - step: "将肉馅平铺在深盘中，厚度约1.5cm"
  - step: "大米淘洗入电饭煲，加适量水按下煮饭键"
    tool: 电饭煲
  - step: "蒸锅水烧开，放入肉饼盘，中火蒸约25分钟至熟透"
    tool: 蒸锅
  - step: "炒锅烧水，西兰花焯水1分钟，捞出沥干"
    tool: 炒锅
  - step: "炒锅倒少许油，下蒜末炒香"
    tool: 炒锅
  - step: "放入西兰花快速翻炒，加少许盐调味即可"
    tool: 炒锅
  - step: "肉饼蒸好后取出，撒葱花，切块装盘"
night_prep:
  - "肉末加玉米粒、胡萝卜碎和腌料拌匀，铺在盘中，盖好冷藏"
  - "西兰花切小朵洗净沥干"
  - "蒜切末"
notes: "肉饼可以前一天晚上全部准备好，包括铺盘冷藏。胡萝卜和玉米的甜味可以让肉饼更鲜，孩子容易接受。"
