title: "虾仁蒸蛋 + 清炒时蔬"
type: dinner
difficulty: easy
total_time: "30分钟"
servings: 4
tools: [蒸锅, 炒锅]
series: "蒸蛋+蔬菜"
tags: [鸡蛋, 虾仁, 蔬菜, 蒸]
ingredient_tags: ['虾仁', '鸡蛋', '荷兰豆']
ingredients:
  虾仁蒸蛋:
    - name: 鸡蛋
      amount: 4个
    - name: 温开水
      amount: 鸡蛋液的1.5倍
      note: 约300ml，40℃左右
    - name: 大虾仁
      amount: 200g
      note: 约20只，去虾线
    - name: 宝宝酱油
      amount: 1小勺
    - name: 香油
      amount: 几滴
    - name: 葱花
      amount: 少许
  清炒时蔬（选一）:
    - name: 荷兰豆
      amount: 200g
      note: 或四季豆/芦笋
    - name: 蒜
      amount: 2瓣
      note: 切末
    - name: 盐
      amount: 少许
    - name: 胡萝卜片
      amount: 少许
      note: 配色用
  主食:
    - name: 大米
      amount: 2杯
steps:
  - step: "鸡蛋打散，加入温开水和少许盐搅匀，用筛网过滤掉泡沫"
  - step: "蛋液倒入深盘中，盖上保鲜膜，用牙签扎几个小孔"
  - step: "蒸锅水开后放入蛋液，中火蒸8分钟"
    tool: 蒸锅
  - step: "打开保鲜膜，在蛋液表面摆上虾仁，继续蒸3-4分钟至虾仁变红"
    tool: 蒸锅
  - step: "取出淋上酱油和香油，撒葱花"
  - step: "同时煮米饭"
    tool: 电饭煲
  - step: "荷兰豆去筋洗净，胡萝卜切片"
  - step: "炒锅倒少许油，下蒜末炒香"
    tool: 炒锅
  - step: "放入荷兰豆和胡萝卜片大火翻炒2-3分钟，加盐调味"
    tool: 炒锅
  - step: "全部上桌"
night_prep:
  - "虾仁去虾线，用少许盐和淀粉抓匀，冷藏"
  - "荷兰豆去筋洗净沥干"
  - "胡萝卜切片"
  - "蒜切末"
notes: "蒸蛋加水用温开水（40℃左右）蒸出来最嫩，冷水容易有蜂窝。保鲜膜要耐热的。蒸蛋和米饭可以同时进行。"
