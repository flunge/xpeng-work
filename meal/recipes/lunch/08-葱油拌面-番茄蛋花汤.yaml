title: "葱油拌面（少油版）+ 番茄蛋花汤"
type: lunch
difficulty: easy
total_time: "20分钟"
servings: 4
tools: [玻璃锅, 炒锅]
series: "面食+汤"
tags: [面食, 快手, 孩子爱]
ingredient_tags: ['葱', '番茄', '生菜']
ingredients:
  葱油拌面:
    - name: 鲜面条或细挂面
      amount: 450g
    - name: 小葱
      amount: 1大把
      note: 约100g，只取葱叶
    - name: 食用油
      amount: 4大勺
    - name: 生抽
      amount: 3大勺
    - name: 老抽
      amount: 1小勺
    - name: 糖
      amount: 1小勺
    - name: 白芝麻
      amount: 少许
  番茄蛋花汤:
    - name: 番茄
      amount: 1个
    - name: 鸡蛋
      amount: 2个
    - name: 葱花
      amount: 少许
    - name: 盐
      amount: 少许
  白灼生菜:
    - name: 生菜
      amount: 1颗
    - name: 蚝油
      amount: 1小勺
steps:
  - step: "小葱洗净沥干，切成长段"
  - step: "锅中倒油，小火，放入葱段慢炸至葱叶焦黄但不要炸糊（约8-10分钟）"
    tool: 炒锅
  - step: "捞出葱段弃用，油中加入生抽、老抽、糖，搅匀煮至冒泡，葱油即成，盛出备用"
    tool: 炒锅
  - step: "大锅烧开水，下面条煮至刚好熟透（不要煮太软）"
    tool: 玻璃锅
  - step: "面条捞出沥干，放入大碗，淋上2-3大勺葱油，用筷子挑起拌匀"
  - step: "汤锅中加水烧开，放入切好的番茄片煮1分钟"
    tool: 玻璃锅
  - step: "淋入打散的蛋液，加盐调味，撒葱花"
    tool: 玻璃锅
  - step: "拌面装盘撒白芝麻，搭配番茄蛋花汤上桌"
  - step: "生菜洗净，开水烫30秒，捞出摆盘，淋蚝油"
    tool: 玻璃锅
night_prep:
  - "葱油可以一次做一周的量（多炸一些），装入密封瓶冷藏保存"
  - "番茄切片冷藏"
  - "小葱切好放入保鲜盒"
  - "生菜洗净沥干"
notes: "我的葱油比外面少放一半油，不油腻但依然很香。如果孩子第一次吃，可以先少放点葱油试口味。拌面可以加烫熟的青菜和鸡蛋丰富营养。"
