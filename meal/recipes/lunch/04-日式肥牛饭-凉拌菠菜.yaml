title: "日式肥牛饭 + 凉拌菠菜"
type: lunch
difficulty: easy
total_time: "20分钟"
servings: 4
tools: [炒锅, 玻璃锅]
series: "盖饭+凉菜"
tags: [牛肉, 洋葱, 日式, 快手]
ingredient_tags: ['肥牛', '洋葱', '菠菜']
ingredients:
  日式肥牛饭:
    - name: 肥牛卷
      amount: 300g
    - name: 洋葱
      amount: 1个
      note: 切丝
    - name: 宝宝酱油
      amount: 2大勺
    - name: 味醂或料酒+糖
      amount: 1大勺
    - name: 糖
      amount: 1小勺
    - name: 水
      amount: 100ml
    - name: 姜片
      amount: 2片
    - name: 热米饭
      amount: 4碗
    - name: 白芝麻
      amount: 少许
  凉拌菠菜:
    - name: 菠菜
      amount: 300g
    - name: 蒜末
      amount: 2瓣
    - name: 生抽
      amount: 1小勺
    - name: 香油
      amount: 1小勺
    - name: 白芝麻
      amount: 少许
steps:
  - step: "锅中烧开水，将肥牛卷快速焯水至变色（约20秒），捞出沥干"
    tool: 玻璃锅
  - step: "倒掉焯水的水，炒锅加少许油，下姜片和洋葱丝炒至洋葱变软透明"
    tool: 炒锅
  - step: "加入酱油、味醂、糖和100ml水，煮开"
    tool: 炒锅
  - step: "放入焯好的肥牛，中火煮2分钟让牛肉吸收汤汁"
    tool: 炒锅
  - step: "少量水淀粉勾薄芡（可选），让汤汁裹在牛肉上"
    tool: 炒锅
  - step: "大碗盛热米饭，铺上肥牛和洋葱，淋上汤汁，撒白芝麻"
  - step: "菠菜焯水（水中加少许油和盐保持翠绿），捞出过凉水，挤干切段"
    tool: 玻璃锅
  - step: "菠菜加蒜末、生抽、香油、白芝麻拌匀"
  - step: "肥牛饭和凉拌菠菜一起上桌"
night_prep:
  - "洋葱切丝，放入保鲜盒冷藏"
  - "酱汁（酱油+味醂+糖+水）调好，冷藏"
  - "菠菜洗净沥干"
  - "肥牛卷从冷冻移至冷藏解冻"
notes: "甜甜咸咸的肥牛饭是孩子最爱日式料理之一。味醂可以用1大勺料酒+半大勺糖代替。如果觉得汤汁太少，可以按比例加倍多做些，孩子喜欢用汤汁拌饭。"
