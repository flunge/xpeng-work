title: "西兰花虾仁炒饭 + 紫菜蛋花汤"
type: lunch
difficulty: easy
total_time: "25分钟"
servings: 4
tools: [炒锅, 玻璃锅]
series: "炒饭+汤"
tags: [炒饭, 海鲜, 蔬菜, 快手]
ingredient_tags: ['虾仁', '西兰花', '胡萝卜', '鸡蛋']
ingredients:
  西兰花虾仁炒饭:
    - name: 熟米饭
      amount: 4碗
      note: 最好用隔夜饭或晾凉的米饭
    - name: 大虾仁
      amount: 200g
      note: 去虾线
    - name: 西兰花
      amount: 小半颗
    - name: 玉米粒
      amount: 小半碗
    - name: 胡萝卜
      amount: 半根
      note: 切小丁
    - name: 鸡蛋
      amount: 2个
    - name: 盐
      amount: 少许
    - name: 宝宝酱油
      amount: 1小勺
  紫菜蛋花汤:
    - name: 紫菜
      amount: 少许
    - name: 鸡蛋
      amount: 1个
    - name: 虾皮
      amount: 少许
    - name: 葱花
      amount: 少许
    - name: 盐
      amount: 少许
steps:
  - step: "虾仁用少许料酒和淀粉腌制5分钟（可接受的话），去腥"
  - step: "西兰花焯水1分钟，捞出切小朵"
  - step: "炒锅倒油，鸡蛋打散炒熟盛出"
    tool: 炒锅
  - step: "锅中再倒少许油，下虾仁炒至变色"
    tool: 炒锅
  - step: "加入胡萝卜丁和玉米粒翻炒1分钟"
    tool: 炒锅
  - step: "倒入米饭，用铲子压散，大火翻炒均匀"
    tool: 炒锅
  - step: "加入西兰花和炒好的鸡蛋，加盐和酱油调味"
    tool: 炒锅
  - step: "翻炒均匀即可出锅"
  - step: "汤锅加水烧开，放入紫菜和虾皮"
    tool: 玻璃锅
  - step: "淋入打散的蛋液，加盐调味，撒葱花"
    tool: 玻璃锅
night_prep:
  - "虾仁去虾线，用少许淀粉抓匀，冷藏"
  - "西兰花焯水后切小朵，冷藏"
  - "胡萝卜切小丁，玉米粒备好"
  - "米饭煮好放凉（多煮一些备用）"
notes: "炒饭用隔夜饭最好，粒粒分明。如果孩子不太喜欢西兰花的味道，可以切碎一点混在饭里。"
