title: "番茄鸡蛋面 + 煎午餐肉"
type: lunch
difficulty: easy
total_time: "20分钟"
servings: 4
tools: [玻璃锅, 不粘煎锅]
series: "面食+主食"
tags: [面食, 番茄, 快手]
ingredient_tags: ['番茄', '鸡蛋', '青菜', '午餐肉']
ingredients:
  番茄鸡蛋面:
    - name: 番茄
      amount: 3个
      note: 中等大小，切小块
    - name: 鸡蛋
      amount: 3个
    - name: 挂面
      amount: 400g
    - name: 小青菜
      amount: 4颗
    - name: 葱花
      amount: 少许
    - name: 盐
      amount: 少许
    - name: 糖
      amount: 1小勺
      note: 平衡酸味
  煎午餐肉:
    - name: 午餐肉
      amount: 半罐
      note: 约200g，切片（备选）
    - name: 黄瓜
      amount: 1根
      note: 切片，搭配解腻
  清炒小油菜:
    - name: 小油菜
      amount: 4颗
    - name: 蒜
      amount: 2瓣
    - name: 盐
      amount: 少许
steps:
  - step: "鸡蛋打散，锅中倒少许油炒熟盛出"
    tool: 玻璃锅
  - step: "锅中再倒少许油，下番茄块炒出汁"
    tool: 玻璃锅
  - step: "加盐和糖，倒入适量开水"
    tool: 玻璃锅
  - step: "水开后下挂面，煮至软硬适中"
    tool: 玻璃锅
  - step: "放入小青菜烫一下"
    tool: 玻璃锅
  - step: "最后倒入炒好的鸡蛋，撒葱花出锅"
  - step: "不粘锅刷薄油，午餐肉切片，煎至两面微焦"
    tool: 不粘煎锅
  - step: "黄瓜切片，和午餐肉一起装盘搭配面条"
  - step: "炒锅加少许油，下蒜末爆香，放入小油菜大火快炒1分钟，加盐调味"
    tool: 炒锅
night_prep:
  - "番茄切小块冷藏"
  - "小青菜洗净沥干"
  - "午餐肉切片，放保鲜盒冷藏"
  - "黄瓜切片冷藏"
  - "小油菜洗净沥干，蒜切末"
notes: "番茄可以选熟透的，汁水更多。加了糖之后番茄汤酸甜可口，孩子很喜欢。"
