title: "茄汁肉酱拌蝴蝶面 + 奶白鲫鱼汤"
type: lunch
difficulty: medium
total_time: "45分钟"
servings: 4
tools: [不粘煎锅, 炒锅, 炖锅]
series: "面食+汤"
tags: [面食, 鱼汤, 肉酱]
ingredient_tags: ['番茄', '猪肉', '洋葱']
ingredients:
  肉酱拌面:
    - name: 番茄
      amount: 3个
      note: 中等大小，去皮切块
    - name: 猪梅花肉末
      amount: 300g
    - name: 洋葱
      amount: 半个
      note: 切碎
    - name: 蝴蝶面或螺丝面
      amount: 400g
    - name: 番茄酱
      amount: 2大勺
    - name: 宝宝酱油
      amount: 1大勺
    - name: 糖
      amount: 1小勺
    - name: 蒜
      amount: 2瓣
      note: 切末
  鲫鱼汤:
    - name: 鲫鱼
      amount: 1条
      note: 约300g，处理干净
    - name: 嫩豆腐
      amount: 1块
      note: 切块
    - name: 姜
      amount: 3-4片
    - name: 小葱
      amount: 2根
      note: 打结
    - name: 盐
      amount: 少许
  白灼小油菜:
    - name: 小油菜
      amount: 4颗
    - name: 蚝油
      amount: 1小勺
steps:
  - step: "鲫鱼处理干净，用厨房纸吸干水分"
    tool: 不粘煎锅
  - step: "锅中倒少许油，放入鲫鱼煎至两面金黄（一面约2-3分钟）"
    tool: 不粘煎锅
  - step: "用铲子将鱼肉捣碎，冲入足量开水（约1.5L），加姜片和葱结"
    tool: 炖锅
  - step: "大火滚煮10分钟至汤色奶白，用细网筛过滤掉鱼刺和鱼渣，只留奶白汤"
    tool: 炖锅
  - step: "汤重新入锅，加入豆腐块煮2分钟，加少许盐调味即可"
    tool: 炖锅
  - step: "番茄顶部划十字，开水烫一下去皮，切小块"
    tool: 炒锅
  - step: "炒锅少许油，下肉末炒至变色，加入洋葱末和蒜末炒香"
    tool: 炒锅
  - step: "加入番茄块炒出汁，再加入番茄酱、酱油、糖和少量水"
    tool: 炒锅
  - step: "中小火炖煮10-15分钟至浓稠，成为茄汁肉酱"
    tool: 炒锅
  - step: "另起一锅水烧开，下蝴蝶面煮8-10分钟至软硬适中，捞出沥干"
    tool: 玻璃锅
  - step: "蝴蝶面淋上茄汁肉酱，搭配鲫鱼汤上桌"
  - step: "小油菜洗净，开水烫1分钟，捞出摆盘，淋蚝油"
    tool: 玻璃锅
night_prep:
  - "番茄划十字烫水去皮，切块冷藏"
  - "洋葱切碎，蒜切末，姜切片备好"
  - "鲫鱼处理干净，用厨房纸吸干水分，冷藏"
  - "豆腐切块泡在水中冷藏"
  - "小油菜洗净沥干"
notes: "鲫鱼捣碎煮汤是汤色奶白的关键，过滤时用细网筛确保没有鱼刺。肉酱可以一次多做些冷藏保存。"
