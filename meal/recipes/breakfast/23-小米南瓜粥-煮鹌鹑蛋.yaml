title: "小米南瓜粥 + 煮鹌鹑蛋 + 牛奶"
type: breakfast
difficulty: easy
total_time: "20分钟（前一晚5分钟 + 早上15分钟）"
servings: 4
tools: [电饭煲, 玻璃锅]
series: "粥+蛋"
week: 3
day: wednesday
tags: [甜味, 粗粮, 暖胃]
ingredient_tags: ['小米', '南瓜', '鹌鹑蛋']
ingredients:
  小米南瓜粥:
    - name: 小米
      amount: 100g
    - name: 南瓜
      amount: 200g
      note: 去皮切小丁
    - name: 红枣
      amount: 4颗
      note: 去核切碎，增加甜味
    - name: 冰糖
      amount: 少许
      optional: true
  配餐:
    - name: 鹌鹑蛋
      amount: 16个
    - name: 纯牛奶
      amount: 4小杯
      note: 配粥喝，补钙促发育
night_prep:
  - "小米淘洗，南瓜去皮切小丁，红枣去核切碎"
  - "全部放入电饭煲，加水（约1:10比例），预约煮粥模式"
morning_steps:
  - "粥已好，搅匀盛碗，可加冰糖调味"
  - "鹌鹑蛋冷水下锅煮5分钟，捞出过冷水剥壳"
  - "南瓜粥和鹌鹑蛋一起上桌"
notes: "南瓜本身就有甜味，不加糖小孩也爱喝。小米比大米更容易消化，早上喝一碗暖暖的。南瓜丁切小一点，煮出来会化在粥里。"
batch_prep: ""
