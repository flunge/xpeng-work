title: "田园蔬菜粥 + 煎蛋 + 牛奶"
type: breakfast
difficulty: easy
total_time: "25分钟（前一晚10分钟 + 早上15分钟）"
servings: 4
tools: [电饭煲, 不粘煎锅]
series: "粥+蛋"
week: 3
day: friday
tags: [咸味, 蔬菜, 粥, 暖胃]
ingredient_tags: ['大米', '胡萝卜', '玉米', '青菜', '鸡蛋']
ingredients:
  田园蔬菜粥:
    - name: 大米
      amount: 1杯
      note: 约150g
    - name: 胡萝卜
      amount: 半根
      note: 切小丁
    - name: 甜玉米粒
      amount: 小半碗
    - name: 小青菜
      amount: 2颗
      note: 切碎
    - name: 盐
      amount: 少许
    - name: 葱花
      amount: 少许
      optional: true
  配餐:
    - name: 鸡蛋
      amount: 4个
    - name: 宝宝酱油
      amount: 少许
    - name: 纯牛奶
      amount: 4小杯
      note: 配粥喝，补钙促发育
night_prep:
  - "大米淘洗，放入电饭煲"
  - "胡萝卜切小丁，和玉米粒一起放入电饭煲"
  - "加水（约1:8比例），预约煮粥模式"
  - "小青菜洗净切碎，冷藏"
morning_steps:
  - "粥已好，开盖，放入青菜碎搅匀，焖2分钟"
  - "加盐和葱花调味，盛碗"
  - "不粘锅刷薄油，煎4个荷包蛋（单面煎，盖盖焖1分钟）"
  - "蔬菜粥和煎蛋一起上桌，蘸酱油吃"
notes: "蔬菜粥的食材可以灵活替换——家里有什么蔬菜就用什么（西葫芦、西兰花、菠菜都行）。胡萝卜和玉米粒前一晚跟米一起煮会非常软烂。"
batch_prep: ""
