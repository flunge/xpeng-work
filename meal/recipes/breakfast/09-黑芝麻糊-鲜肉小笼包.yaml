title: "黑芝麻糊 + 鲜肉小笼包"
type: breakfast
difficulty: easy
total_time: "20分钟（前一晚5分钟 + 早上15分钟）"
servings: 4
tools: [破壁机, 蒸锅]
series: "糊+饭团"
week: 2
day: tuesday
tags: [坚果, 主食, 快手]
ingredient_tags: ['黑芝麻']
ingredients:
  黑芝麻糊:
    - name: 黑芝麻
      amount: 50g
      note: 熟黑芝麻
    - name: 糯米
      amount: 30g
    - name: 红枣
      amount: 3颗
      note: 去核
    - name: 冰糖
      amount: 适量
  配餐:
    - name: 速冻鲜肉小笼包
      amount: 16个
      note: 可周末自制，包好生胚冷冻，吃前直接蒸10-12分钟（无需解冻）；或买配料表干净的品牌
    - name: 醋
      amount: 少许
      note: 蘸料
    - name: 卤蛋
      amount: 4个
      note: 全熟，前一晚泡卤汁冷藏入味
night_prep:
  - "黑芝麻、糯米、红枣放入破壁机，加水至500ml，预约'米糊'功能"
  - "鸡蛋冷水下锅煮8分钟至全熟，捞出过冷水剥壳"
  - "卤汁：酱油2大勺+水3大勺+糖1小勺+八角1个煮开放凉，放入剥壳鸡蛋，冷藏浸泡过夜"
  - "速冻小笼包从冷冻室移至冷藏室解冻（约需6-8小时，睡前移出即可）"
morning_steps:
  - "黑芝麻糊已好，倒入碗中，加冰糖调味"
  - "卤蛋从卤汁中捞出，对半切开（前一晚已卤好入味，早上只需切）"
  - "蒸锅加水烧开，铺上蒸笼纸或刷油防粘"
  - "放入小笼包，大火蒸8-10分钟"
  - "卤蛋和小笼包一起上桌，蘸醋食用"
batch_prep: "小笼包：周末包生胚冷冻，约32个（够2次）"
notes: "如果来不及解冻小笼包，可以直接冷冻状态上锅蒸，多蒸3-4分钟即可。卤蛋前一晚泡入味，早上直接切，卤汁可以重复用一周。黑芝麻糊补钙，适合孩子。"
