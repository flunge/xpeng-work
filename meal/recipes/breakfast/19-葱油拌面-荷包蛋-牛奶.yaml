title: "葱油拌面（少油版）+ 荷包蛋 + 牛奶"
type: breakfast
difficulty: easy
total_time: "15分钟（前一晚10分钟 + 早上5分钟）"
servings: 4
tools: [玻璃锅, 不粘煎锅]
series: "面食"
week: 3
day: wednesday
tags: [面食, 快手, 孩子爱]
ingredient_tags: ['鸡蛋', '牛奶', '葱']
ingredients:
  葱油拌面:
    - name: 细挂面或鲜面条
      amount: 300g
    - name: 小葱
      amount: 1大把
      note: 约80g，只取葱叶部分
    - name: 生抽
      amount: 3大勺
    - name: 老抽
      amount: 1小勺
      note: 上色用
    - name: 糖
      amount: 1小勺
    - name: 食用油
      amount: 3大勺
    - name: 白芝麻
      amount: 少许
      optional: true
  配餐:
    - name: 鸡蛋
      amount: 4个
    - name: 纯牛奶
      amount: 4杯
night_prep:
  - "小葱洗净，切掉葱白不要，葱叶切成长段（约5cm），沥干水分（带水炸油会溅）"
  - "锅中倒油，放入葱段，小火慢炸至葱变焦黄但不要糊（约10分钟），捞出葱段弃用"
  - "油中加入生抽、老抽、糖，煮至冒泡关火，倒入密封瓶中冷藏保存"
  - "葱油可以一次做一周的量，冰箱冷藏保存"
morning_steps:
  - "锅中烧开水，下面条煮至软硬适中（煮面时水要多）"
  - "面条捞出沥干水分，放入大碗中"
  - "根据口味淋入1-2大勺葱油，快速拌匀（可以用两双筷子挑拌）"
  - "同时不粘锅刷薄油，打入鸡蛋，中小火煎至两面金黄、蛋黄全熟"
  - "拌面装盘，放上荷包蛋，撒少许白芝麻"
  - "搭配牛奶上桌"
notes: "葱油一次多做点冷藏，早上煮面+煎蛋5分钟就搞定。我的版本油量比外面餐厅少一半，更适合孩子。如果小孩不喜欢葱味，可以减少葱油用量，多加一点生抽。"
