title: "番茄鸡蛋疙瘩汤 + 香煎鸡肉饼"
type: breakfast
difficulty: easy
total_time: "25分钟（前一晚15分钟 + 早上10分钟）"
servings: 4
tools: [玻璃锅, 不粘煎锅]
series: "汤面"
week: 3
day: tuesday
tags: [番茄, 鸡蛋, 暖胃, 酸甜]
ingredient_tags: ['番茄', '鸡蛋', '面粉', '青菜', '鸡胸肉']
ingredients:
  番茄鸡蛋疙瘩汤:
    - name: 番茄
      amount: 2个
      note: 中等大小，选熟透的
    - name: 鸡蛋
      amount: 2个
    - name: 面粉
      amount: 100g
    - name: 小青菜
      amount: 2颗
      note: 切碎
    - name: 葱花
      amount: 少许
    - name: 盐
      amount: 少许
    - name: 糖
      amount: 1小勺
      note: 平衡酸味，小孩更喜欢
    - name: 香油
      amount: 几滴
  香煎鸡肉饼:
    - name: 鸡胸肉
      amount: 1块
      note: 约150g，剁成肉泥
    - name: 鸡蛋
      amount: 1个
    - name: 淀粉
      amount: 1大勺
    - name: 葱花
      amount: 少许
    - name: 盐
      amount: 少许
    - name: 宝宝酱油
      amount: 1小勺
night_prep:
  - "番茄顶部划十字，开水烫一下去皮，切小块，冷藏"
  - "小青菜洗净切碎，冷藏"
  - "鸡胸肉剁成泥，加入鸡蛋、淀粉、葱花、盐、酱油搅拌上劲，做成4-6个小肉饼，放冷藏（每层用油纸隔开）"
  - "面粉放入碗中，盖好备用"
morning_steps:
  - "玻璃锅加少许油，放入番茄块炒至出汁，加入盐和糖，倒入约800ml开水"
  - "面粉中慢慢加入少量水（约50ml），用筷子快速搅拌成均匀的小面疙瘩"
  - "水开后，将面疙瘩均匀撒入锅中，用筷子搅散"
  - "煮2分钟后，淋入打散的蛋液，不要立刻搅动，等蛋花浮起"
  - "放入青菜碎，煮30秒关火，撒葱花和香油"
  - "同时不粘锅刷薄油，放入鸡肉饼中小火煎至两面金黄、熟透（每面4-5分钟）"
  - "疙瘩汤和鸡肉饼一起上桌"
notes: "疙瘩汤是很多孩子生病时也愿意吃的，酸甜开胃。面疙瘩要大小均匀才好看，水一点一点加。煎肠可以切成小章鱼形状（切几刀但不断，煎了会张开），孩子更喜欢。"
