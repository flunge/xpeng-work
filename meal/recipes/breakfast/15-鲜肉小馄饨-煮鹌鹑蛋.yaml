title: "鲜肉小馄饨 + 五香鹌鹑蛋"
type: breakfast
difficulty: easy
total_time: "20分钟（前一晚10分钟 + 早上10分钟）"
servings: 4
tools: [玻璃锅]
series: "汤面"
week: 2
day: saturday
tags: [汤面, 肉, 蛋, 暖胃]
ingredient_tags: ['鹌鹑蛋']
ingredients:
  鲜肉小馄饨:
    - name: 速冻鲜肉小馄饨
      amount: 32-40个
      note: 可周末包好生胚冷冻（撒面粉防粘），吃前直接煮不须解冻；或买配料表干净的品牌
    - name: 虾皮
      amount: 一小把
    - name: 紫菜
      amount: 少许
    - name: 葱花
      amount: 适量
    - name: 生抽
      amount: 1小勺
    - name: 香油
      amount: 几滴
    - name: 白胡椒粉
      amount: 少许
  五香鹌鹑蛋:
    - name: 鹌鹑蛋
      amount: 12-16个
    - name: 盐
      amount: 少许
night_prep:
  - "速冻小馄饨从冷冻室移至冷藏室解冻"
  - "紫菜撕碎，虾皮备好，葱花切好放小盒冷藏"
  - "汤底调配好：碗中放生抽、香油、白胡椒粉，盖好"
  - "鹌鹑蛋提前煮熟剥壳，泡在五香汁中（生抽+水+八角+少许糖）冷藏过夜更入味"
morning_steps:
  - "锅中烧开水，放入小馄饨煮5-6分钟至全部浮起熟透"
  - "碗中放入紫菜、虾皮、葱花，倒入煮馄饨的汤和调味料"
  - "捞出馄饨放入碗中，淋几滴香油"
  - "鹌鹑蛋从五香汁中捞出，对半切开"
  - "馄饨汤和鹌鹑蛋一起上桌"
batch_prep: "小馄饨：周末包生胚冷冻（撒面粉防粘），约80个（够2次）"
notes: "煮馄饨的汤不要太多水，够每人一碗即可。一晚泡好的五香鹌鹑蛋很入味，小孩一口一个方便吃。天冷时一碗热馄饨最舒服了。"
