title: "紫薯燕麦奶 + 芝士厚蛋烧"
type: breakfast
difficulty: easy
total_time: "20分钟（前一晚10分钟 + 早上10分钟）"
servings: 4
tools: [破壁机, 不粘煎锅]
series: "饮品+蛋"
week: 1
day: saturday
tags: [甜味, 粗粮, 蛋奶, 高蛋白]
ingredient_tags: ['紫薯', '燕麦', '鸡蛋', '芝士', '鸡胸肉']
ingredients:
  紫薯燕麦奶:
    - name: 紫薯
      amount: 1个
      note: 约150g，去皮切小块
    - name: 传统燕麦片
      amount: 30g
      note: 需煮型，无添加剂；不要用即食燕麦片
    - name: 牛奶
      amount: 500ml
    - name: 炼乳
      amount: 少许
      optional: true
  芝士厚蛋烧:
    - name: 鸡蛋
      amount: 6个
    - name: 牛奶
      amount: 2大勺
    - name: 芝士片
      amount: 2片
    - name: 鸡胸肉
      amount: 半块
      note: 约80g，煮熟切小丁，代替火腿丁
    - name: 盐
      amount: 少许
    - name: 番茄酱
      amount: 少许
      note: 蘸食
night_prep:
  - "紫薯去皮切小块，和燕麦片、牛奶一起放入破壁机碗中，预约'米糊'功能（破壁机冷藏预约）"
  - "鸡胸肉冷水下锅煮8分钟，焖5分钟至熟透，捞出切小丁，放入保鲜盒冷藏"
  - "鸡蛋打散，加牛奶和盐搅匀，冷藏备用"
morning_steps:
  - "紫薯燕麦奶已好，倒入杯中，可加少许炼乳"
  - "不粘锅开小火，刷薄油，倒入三分之一蛋液摊平"
  - "蛋液半凝固时撒上鸡肉丁，放上半片芝士片"
  - "用铲子将蛋皮从一端卷起到另一端，推到锅边"
  - "再倒入三分之一蛋液，让新蛋液流到锅底摊平"
  - "重复卷起步骤，再倒最后一次蛋液卷成厚卷"
  - "各面煎一下定型，取出切厚块，搭配番茄酱食用"
notes: "紫薯燕麦奶颜色是淡紫色的，视觉上就很吸引孩子。厚蛋烧可以前一晚做好，早上切块在不粘锅小火回温2分钟即可。"
