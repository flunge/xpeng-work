title: "鲜虾蔬菜粥 + 溏心蛋 + 牛奶"
type: breakfast
difficulty: easy
total_time: "前一晚预约 + 早上15分钟"
servings: 4
tools: [电饭煲, 玻璃锅]
series: "粥+蛋+奶"
tags: [咸味, 鲜虾, 粥, 暖胃]
ingredient_tags: ['大米', '虾仁', '青菜', '胡萝卜', '鸡蛋', '牛奶']
ingredients:
  鲜虾蔬菜粥:
    - name: 大米
      amount: 1杯
      note: 约150g
    - name: 虾仁
      amount: 200g
      note: 去虾线，补锌补钙助发育
    - name: 小青菜
      amount: 2颗
      note: 切碎
    - name: 胡萝卜
      amount: 半根
      note: 切小丁
    - name: 姜丝
      amount: 少许
    - name: 盐
      amount: 少许
  配餐:
    - name: 鸡蛋
      amount: 4个
      note: 溏心蛋（煮6分钟）
    - name: 纯牛奶
      amount: 4小杯
night_prep:
  - "大米+胡萝卜丁放电饭煲，加水1:8预约煮粥；虾仁解冻去线冷藏，青菜洗净"
morning_steps:
  - "粥快好时放入虾仁和姜丝煮3分钟至虾变红"
  - "放青菜碎搅匀焖2分钟，加盐调味"
  - "鸡蛋冷水下锅煮6分钟（溏心），过冷水剥壳对半切"
  - "鲜虾粥配溏心蛋和牛奶上桌"
notes: "虾仁补锌补钙、是长身体的好食材；溏心蛋口感嫩，孩子爱吃（确保虾煮熟）。粥底前一晚预约，早上加虾加菜即可。"
