title: "香甜玉米糊 + 海苔肉松饭团"
type: breakfast
difficulty: easy
total_time: "25分钟（前一晚10分钟 + 早上15分钟）"
servings: 4
tools: [破壁机, 电饭煲]
series: "糊+饭团"
week: 1
day: tuesday
tags: [甜味, 玉米, 主食]
ingredient_tags: ['玉米', '大米', '肉松']
ingredients:
  香甜玉米糊:
    - name: 甜玉米粒
      amount: 200g
    - name: 大米
      amount: 20g
    - name: 红枣
      amount: 4颗
      note: 去核
  饭团:
    - name: 熟米饭
      amount: 3碗
      note: 前一晚多煮的米饭，或剩米饭
    - name: 儿童肉松
      amount: 适量
    - name: 海苔片
      amount: 4片
      note: 大张海苔剪成小条
    - name: 寿司醋
      amount: 1小勺
      optional: true
    - name: 马苏里拉芝士碎
      amount: 适量
      optional: true
night_prep:
  - "甜玉米粒、大米、红枣放入破壁机，加水至500ml，预约'米糊'功能"
  - "如果有剩米饭，拌入少许寿司醋和糖，盖上保鲜膜冷藏备用"
morning_steps:
  - "玉米糊已好，倒入碗中"
  - "米饭用蒸锅蒸5分钟至微温，或电饭煲加1小勺水焖热"
  - "保鲜膜上铺一层米饭，中间放肉松和芝士碎"
  - "提起保鲜膜四角，包成紧实的圆形或三角形"
  - "贴上一条海苔片装饰即可"
notes: "饭团可以前一天晚上就做好，早上直接吃。玉米糊比小米糊更香甜，孩子更爱吃。"
