title: "香蕉燕麦软饼 + 原味酸奶"
type: breakfast
difficulty: easy
total_time: "20分钟（前一晚5分钟 + 早上15分钟）"
servings: 4
tools: [空气炸锅]
series: "燕麦/松饼"
week: 1
day: wednesday
tags: [甜味, 水果, 快手, 无油]
ingredient_tags: ['香蕉', '燕麦', '酸奶', '鸡蛋']
ingredients:
  燕麦饼:
    - name: 香蕉
      amount: 2根
      note: 熟透的香蕉，碾成泥
    - name: 鸡蛋
      amount: 1个
    - name: 传统燕麦片
      amount: 80g
      note: 需煮型，提前用热水泡软或用牛奶煮至软糯
    - name: 牛奶
      amount: 50ml
    - name: 蔓越莓干
      amount: 20g
      optional: true
  搭配:
    - name: 原味酸奶
      amount: 4小杯
night_prep:
  - "香蕉碾成泥，打入鸡蛋，加入燕麦片和牛奶，搅拌至浓稠糊状"
  - "加入蔓越莓干拌匀"
  - "盖上保鲜膜，冷藏过夜（传统燕麦片充分吸水软化，口感更好）"
morning_steps:
  - "空气炸锅180℃预热3分钟"
  - "烤盘垫油纸，将燕麦糊分成4-6份放在纸上，用勺子背摊成小饼状（厚度约1cm）"
  - "放入炸锅，180℃烤10-12分钟，至表面金黄"
  - "取出搭配酸奶食用"
notes: "燕麦糊冷藏后会变稠，如果太干可以早上加少量牛奶调整。搭配水果如蓝莓、草莓更丰富。"
