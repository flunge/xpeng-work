title: "西兰花浓汤 + 脆皮煎饺"
type: breakfast
difficulty: easy
total_time: "20分钟（前一晚5分钟 + 早上15分钟）"
servings: 4
tools: [破壁机, 不粘煎锅]
series: "浓汤+煎点"
week: 3
day: monday
tags: [蔬菜, 主食, 高纤维, 创意]
ingredient_tags: ['西兰花', '土豆', '鸡蛋']
ingredients:
  西兰花浓汤:
    - name: 西兰花
      amount: 1颗
      note: 约250g，切小朵
    - name: 土豆
      amount: 1个
      note: 中等大小，切块，增加浓稠度
    - name: 洋葱
      amount: ¼个
    - name: 牛奶
      amount: 150ml
    - name: 盐
      amount: 少许
    - name: 大蒜
      amount: 1瓣
      note: 切末代替蒜粉，更天然
  脆皮煎饺:
    - name: 速冻水饺
      amount: 20个
      note: 猪肉白菜馅或三鲜馅；可周末包好生胚冷冻，吃前直接煎不须解冻
    - name: 面粉
      amount: 1小勺
      note: 调冰花用
    - name: 水
      amount: 80ml
    - name: 黑芝麻
      amount: 少许
      optional: true
    - name: 葱花
      amount: 少许
    - name: 香醋
      amount: 少许
      note: 蘸食
night_prep:
  - "西兰花掰小朵洗净，土豆去皮切小块，洋葱切块"
  - "全部放入破壁机，加水至500ml，预约'浓汤'功能（早上打好后加牛奶）"
  - "速冻水饺从冷冻室移至冷藏室解冻"
  - "面粉和水调匀成冰花水，冷藏备用"
morning_steps:
  - "浓汤打好后加牛奶和盐，再打几秒混合均匀"
  - "鸡蛋打散，浓汤打好后加牛奶和盐，再打几秒混合，最后倒入蛋液搅打成蛋花浓汤"
  - "不粘锅刷薄油，中小火烧热，将饺子底部朝下整齐排列在锅中"
  - "煎至饺子底部金黄（约2分钟）"
  - "倒入冰花水，盖盖子转中火焖煮5-6分钟至水分基本收干"
  - "开盖继续煎至水分完全收干，底部形成金黄色脆网"
  - "撒黑芝麻和葱花，用铲子轻轻铲起装盘"
  - "蛋花浓汤和脆皮煎饺、香醋一起上桌"
batch_prep: "水饺：周末包生胚冷冻，约40个（够2次）"
notes: "西兰花浓汤颜色翠绿，看起来很清新。孩子可能对纯西兰花汤有戒心，但加了土豆和牛奶后口感顺滑，味道柔和，他们一般喝不出是西兰花。"
