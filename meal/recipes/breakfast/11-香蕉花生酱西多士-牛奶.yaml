title: "香蕉花生酱西多士 + 纯牛奶"
type: breakfast
difficulty: easy
total_time: "15分钟（前一晚5分钟 + 早上10分钟）"
servings: 4
tools: [不粘煎锅]
series: "吐司"
week: 2
day: wednesday
tags: [甜味, 水果, 蛋奶, 快手]
ingredient_tags: ['香蕉', '花生酱', '吐司', '牛奶', '鸡蛋']
ingredients:
  香蕉花生酱西多士:
    - name: 吐司面包
      amount: 8片
      note: 去边或不去边均可
    - name: 香蕉
      amount: 2根
      note: 熟透的，切成薄片
    - name: 花生酱
      amount: 3大勺
      note: 选无盐/低糖的儿童花生酱
    - name: 鸡蛋
      amount: 2个
    - name: 牛奶
      amount: 50ml
    - name: 黄油
      amount: 一小块
      note: 煎吐司用
  搭配:
    - name: 纯牛奶
      amount: 4杯
    - name: 蓝莓或草莓
      amount: 适量
      optional: true
night_prep:
  - "香蕉切片，放入密封盒中（撒少许柠檬汁防氧化）"
  - "鸡蛋打散加牛奶搅匀成蛋奶液，冷藏"
  - "吐司片每两片一组，其中一片抹上花生酱"
  - "花生酱上铺香蕉片，盖上另一片吐司，轻压"
morning_steps:
  - "将夹好的吐司两面快速蘸上蛋奶液（不要泡太久，两面各蘸2秒即可）"
  - "不粘锅小火加热，放入一小块黄油融化"
  - "放入蘸好蛋液的吐司，中小火煎至两面金黄（每面约1.5-2分钟）"
  - "出锅后沿对角线切开，摆上水果"
  - "搭配牛奶上桌"
notes: "香蕉和花生酱是绝配，孩子们超爱。用低糖花生酱，避免太甜。如果孩子小，可以把吐司边切掉，口感更软。"
