title: "虾仁滑蛋 + 吐司 + 牛奶"
type: breakfast
difficulty: easy
total_time: "15分钟（前一晚5分钟 + 早上10分钟）"
servings: 4
tools: [不粘煎锅]
series: "蛋+面包"
week: 3
day: tuesday
tags: [海鲜, 蛋奶, 高蛋白, 快手]
ingredient_tags: ['虾仁', '鸡蛋', '吐司', '牛奶']
ingredients:
  虾仁滑蛋:
    - name: 大虾仁
      amount: 200g
      note: 去虾线，超市冷冻虾仁或新鲜虾仁
    - name: 鸡蛋
      amount: 6个
    - name: 牛奶
      amount: 2大勺
      note: 加入蛋液，更嫩滑
    - name: 盐
      amount: 少许
    - name: 白胡椒粉
      amount: 少许
    - name: 葱花
      amount: 少许
  配餐:
    - name: 吐司片
      amount: 8片
      note: 烤一下更香
    - name: 纯牛奶
      amount: 4杯
night_prep:
  - "虾仁解冻（如用冷冻虾仁），洗净沥干，加少许盐和料酒抓匀，冷藏腌制"
  - "鸡蛋打散加牛奶和少许盐搅匀，冷藏备用"
morning_steps:
  - "吐司片放入烤箱或空气炸锅，160℃烤3分钟至表面微黄"
  - "不粘锅加少许油，中火烧热，倒入虾仁快速翻炒至变色（约1分钟）"
  - "转小火，倒入蛋液，用铲子轻轻推"
  - "蛋液半凝固时关火，用余温继续推至鸡蛋嫩滑（不要炒老）"
  - "撒葱花和白胡椒粉"
  - "吐司、滑蛋、牛奶一起上桌"
notes: "虾仁滑蛋的关键是火候——蛋液下锅后小火慢推，半凝固就关火，余温会把蛋弄熟，这样才嫩。冷冻虾仁提前一晚放冷藏解冻即可。"
batch_prep: ""
