title: "香煎南瓜饼 + 水煮蛋 + 核桃黑芝麻糊"
type: breakfast
difficulty: easy
total_time: "25分钟（前一晚10分钟 + 早上15分钟）"
servings: 4
tools: [不粘煎锅, 破壁机, 玻璃锅]
series: "饼+蛋+糊"
tags: [甜味, 南瓜, 粗粮, 主食]
ingredient_tags: ['南瓜', '糯米粉', '鸡蛋', '核桃', '黑芝麻', '大米']
ingredients:
  香煎南瓜饼:
    - name: 南瓜
      amount: 300g
      note: 蒸熟压泥
    - name: 糯米粉
      amount: 150g
    - name: 面包糠
      amount: 适量
      optional: true
  核桃黑芝麻糊:
    - name: 黑芝麻
      amount: 40g
      note: 补钙、健脑
    - name: 核桃
      amount: 30g
      note: 健脑，含优质脂肪
    - name: 大米
      amount: 20g
    - name: 冰糖
      amount: 少许
      optional: true
  配餐:
    - name: 鸡蛋
      amount: 4个
      note: 水煮蛋
night_prep:
  - "南瓜蒸熟压泥+糯米粉揉成团，搓成小饼冷藏；黑芝麻核桃大米备好"
morning_steps:
  - "黑芝麻、核桃、大米放破壁机加水700ml打糊"
  - "不粘锅少油，南瓜饼小火煎至两面金黄（可裹面包糠更脆）"
  - "鸡蛋冷水煮7分钟剥壳"
  - "南瓜饼配核桃黑芝麻糊和水煮蛋上桌"
notes: "黑芝麻核桃糊补钙健脑，南瓜饼软糯香甜（粗粮）。煎饼用小火，少油更健康。"
