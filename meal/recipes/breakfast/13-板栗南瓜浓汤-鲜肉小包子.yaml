title: "板栗南瓜浓汤 + 鲜肉小包子"
type: breakfast
difficulty: easy
total_time: "20分钟（前一晚5分钟 + 早上15分钟）"
servings: 4
tools: [破壁机, 蒸锅]
series: "浓汤+蒸点"
week: 2
day: thursday
tags: [甜味, 蔬菜, 主食, 饱腹]
ingredient_tags: ['南瓜', '鸡蛋']
ingredients:
  板栗南瓜浓汤:
    - name: 板栗南瓜
      amount: 300g
      note: 去皮去籽切小块，比普通南瓜更甜更粉
    - name: 洋葱
      amount: ¼个
      note: 切小块，增加风味层次
    - name: 牛奶
      amount: 150ml
    - name: 核桃仁
      amount: 3个
      note: 增香，富含DHA
    - name: 盐
      amount: 少许
    - name: 淡奶油
      amount: 少许
      optional: true
      note: 表面装饰
  配餐:
    - name: 速冻鲜肉小包子
      amount: 8-12个
      note: 可周末自制，包好生胚冷冻，吃前直接蒸10分钟（无需解冻）；或买现包包子
    - name: 醋
      amount: 少许
      note: 蘸料
    - name: 太阳蛋
      amount: 4个
night_prep:
  - "南瓜去皮去籽切小块，洋葱切小块"
  - "南瓜、洋葱、核桃仁放入破壁机，加水至500ml，预约'浓汤'功能"
  - "速冻小包子从冷冻室移至冷藏室解冻（睡前拿出即可）"
morning_steps:
  - "南瓜浓汤打好后，加入牛奶和少许盐，再打几秒混合均匀"
  - "不粘锅刷薄油，打入鸡蛋，小火煎至蛋白凝固、蛋黄全熟，即为太阳蛋（单面煎，盖盖子焖1分钟让表面凝固）"
  - "蒸锅加水烧开，放入小包子大火蒸8-10分钟"
  - "浓汤倒入碗中，表面滴几滴淡奶油划出花纹（可不做）"
  - "太阳蛋蘸少许酱油，和小包子、浓汤一起上桌"
batch_prep: "小包子：周末包生胚冷冻，约24个（够2-3次）"
notes: "板栗南瓜是南瓜中最好吃的品种，口感粉糯、甜度高，不加糖也有自然甜味。核桃仁让浓汤有坚果香气，孩子喝不出但营养加分。"
