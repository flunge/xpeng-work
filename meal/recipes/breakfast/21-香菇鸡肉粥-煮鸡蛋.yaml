title: "香菇鸡肉粥 + 煮鸡蛋"
type: breakfast
difficulty: easy
total_time: "25分钟（前一晚10分钟 + 早上15分钟）"
servings: 4
tools: [电饭煲, 玻璃锅]
series: "粥+蛋"
week: 3
day: monday
tags: [咸味, 粥, 鸡肉, 暖胃]
ingredient_tags: ['鸡胸肉', '香菇', '大米', '鸡蛋']
ingredients:
  香菇鸡肉粥:
    - name: 大米
      amount: 1杯
      note: 约150g
    - name: 鸡胸肉
      amount: 1块
      note: 约150g，切小丁
    - name: 干香菇
      amount: 4朵
      note: 提前泡发，切小丁
    - name: 姜
      amount: 2片
      note: 切丝
    - name: 盐
      amount: 少许
    - name: 葱花
      amount: 少许
    - name: 香油
      amount: 几滴
  配餐:
    - name: 鸡蛋
      amount: 4个
    - name: 宝宝酱油
      amount: 少许
      note: 蘸蛋吃
night_prep:
  - "大米淘洗，放入电饭煲，加水至煮粥水位线（约1:8比例）"
  - "鸡胸肉切小丁，香菇泡发切丁，姜切丝"
  - "全部放入电饭煲，预约煮粥功能（设好早上完成时间）"
  - "鸡蛋从冷藏取出回温"
morning_steps:
  - "粥已好，加盐调味，撒葱花和香油"
  - "鸡蛋冷水下锅，水开后煮7分钟，捞出过冷水"
  - "粥盛碗，鸡蛋剥壳对半切开，蘸酱油吃"
  - "粥和鸡蛋一起上桌"
notes: "电饭煲预约煮粥非常省事，肉类和香菇一起放进去味道更融合。如果想吃更绵密的粥，可以选'稠粥'或'杂粮粥'模式。"
batch_prep: ""
