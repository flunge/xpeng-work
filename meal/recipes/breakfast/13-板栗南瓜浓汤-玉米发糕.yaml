title: "板栗南瓜浓汤 + 玉米面发糕"
type: breakfast
difficulty: easy
total_time: "20分钟（前一晚15分钟发酵 + 早上15分钟）"
servings: 4
tools: [破壁机, 蒸锅]
series: "浓汤+蒸点"
week: 2
day: thursday
tags: [甜味, 蔬菜, 主食, 饱腹, 粗粮]
ingredient_tags: ['南瓜', '鸡蛋', '玉米面']
ingredients:
  板栗南瓜浓汤:
    - name: 板栗南瓜
      amount: 300g
      note: 去皮去籽切小块，比普通南瓜更甜更粉
    - name: 洋葱
      amount: ¼个
      note: 切小块，增加风味层次
    - name: 牛奶
      amount: 150ml
    - name: 核桃仁
      amount: 3个
      note: 增香，富含DHA
    - name: 盐
      amount: 少许
    - name: 淡奶油
      amount: 少许
      optional: true
      note: 表面装饰
  玉米面发糕:
    - name: 玉米面
      amount: 100g
      note: 细玉米面口感更细腻
    - name: 中筋面粉
      amount: 100g
    - name: 酵母
      amount: 2g
    - name: 牛奶
      amount: 130ml
      note: 温牛奶和面更香
    - name: 白糖
      amount: 10g
      note: 助发酵+微甜，孩子爱
  配餐:
    - name: 太阳蛋
      amount: 4个
night_prep:
  - "南瓜去皮去籽切小块，洋葱切小块"
  - "南瓜、洋葱、核桃仁放入破壁机，加水至500ml，预约'浓汤'功能"
  - "玉米面+面粉+酵母+糖，用温牛奶和成糊状面团，倒入刷油模具，冷藏慢发酵过夜（或室温发至两倍大）"
morning_steps:
  - "南瓜浓汤打好后，加入牛奶和少许盐，再打几秒混合均匀"
  - "发好的发糕面糊连模具放入蒸锅，水开后中火蒸18分钟，焖3分钟再开盖，切块"
  - "不粘锅刷薄油，打入鸡蛋，小火煎至蛋白凝固、蛋黄全熟即太阳蛋（盖盖子焖1分钟让表面凝固）"
  - "浓汤倒入碗中，表面滴几滴淡奶油划出花纹（可不做）"
  - "太阳蛋、发糕、浓汤一起上桌"
notes: "玉米面发糕是粗粮主食，松软微甜孩子爱吃，替代包子避免早餐主食同质化（原配鲜肉包与09号小笼包撞车）。板栗南瓜粉糯甜、核桃补DHA。发糕可一次多蒸冷冻，早上复蒸5分钟。"
