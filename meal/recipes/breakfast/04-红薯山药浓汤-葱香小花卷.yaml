title: "红薯山药浓汤 + 葱香小花卷"
type: breakfast
difficulty: easy
total_time: "25分钟（前一晚15分钟 + 早上10分钟）"
servings: 4
tools: [蒸锅, 破壁机, 炒锅]
series: "浓汤+蒸点"
week: 1
day: thursday
tags: [甜味, 蔬菜, 杂粮]
ingredient_tags: ['红薯', '山药', '鹌鹑蛋']
ingredients:
  浓汤:
    - name: 红薯
      amount: 1大个
      note: 约300g，去皮切块
    - name: 铁棍山药
      amount: 半根
      note: 约80g，去皮切段，山药太多会发麻发涩
    - name: 核桃仁
      amount: 3个
      note: 增加香气
    - name: 牛奶
      amount: 200ml
  配餐:
    - name: 速冻小花卷
      amount: 8个
      note: 可周末自制花卷蒸熟冷冻，吃前蒸8分钟即可；或买新鲜花卷、用蒸紫薯代替
    - name: 鸡胸肉
      amount: 半块
      note: 约80g，煮熟切小丁，代替火腿肠
    - name: 甜玉米粒
      amount: 小半碗
    - name: 鹌鹑蛋
      amount: 12个
      note: 煮熟剥壳
night_prep:
  - "红薯去皮切块，山药去皮切小段，一起放入蒸锅，大火蒸15分钟至筷子能轻松扎透"
  - "蒸好的红薯和山药放凉，和核桃仁一起放入密封盒冷藏备用（如怕变色可加少许牛奶没过表面）"
  - "速冻小花卷从冷冻室移至冷藏室解冻"
  - "鸡胸肉煮熟切小丁（或撕成细丝），和玉米粒一起放入保鲜盒冷藏"
morning_steps:
  - "将蒸好的红薯、山药、核桃仁放入破壁机，加入牛奶和200ml水（共约400-450ml液体）"
  - "选择'果蔬'或'浓汤'模式打1-2分钟至顺滑（无需加热，材料已熟）"
  - "如果太稠可加适量热水调到喜欢的稠度"
  - "鹌鹑蛋冷水下锅煮5分钟，捞出过冷水剥壳"
  - "蒸锅加水烧开，放入花卷蒸8-10分钟"
  - "同时炒锅加少许油，炒香鸡肉丁和玉米粒（约2分钟）作为配菜"
  - "鹌鹑蛋、花卷、配菜和浓汤一起上桌"
batch_prep: "花卷：周末做一次蒸熟冷冻，够2-3次用（约24个）"
notes: "⚠️ 关键：山药和红薯一定要先蒸熟再打！生打会发麻发涩，小孩抗拒。山药减到半根即可，太多口感发黏且涩味重。破壁机容量有限，总液体量控制在450ml以内。浓汤打好后如果太稠可以用热牛奶或热水调整。"
