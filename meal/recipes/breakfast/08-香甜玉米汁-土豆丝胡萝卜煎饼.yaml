title: "香甜玉米汁 + 土豆丝胡萝卜煎饼"
type: breakfast
difficulty: easy
total_time: "25分钟（前一晚10分钟 + 早上15分钟）"
servings: 4
tools: [破壁机, 不粘煎锅]
series: "饮品+饼"
week: 2
day: monday
tags: [甜味, 蔬菜, 粗粮, 快手]
ingredient_tags: ['玉米', '土豆', '胡萝卜', '面粉', '鸡蛋']
ingredients:
  香甜玉米汁:
    - name: 甜玉米粒
      amount: 200g
      note: 冷冻或新鲜玉米剥粒
    - name: 大米
      amount: 20g
    - name: 牛奶
      amount: 200ml
    - name: 冰糖
      amount: 少许
  土豆丝胡萝卜煎饼:
    - name: 土豆
      amount: 2个
      note: 中等大小，约300g
    - name: 胡萝卜
      amount: 半根
    - name: 鸡蛋
      amount: 2个
    - name: 面粉
      amount: 3大勺
    - name: 小葱
      amount: 2根
      note: 切葱花
    - name: 盐
      amount: 少许
    - name: 白胡椒粉
      amount: 少许
night_prep:
  - "玉米粒、大米、水（约400ml）放入破壁机，预约'豆浆'功能（早上打好后再加牛奶）"
  - "土豆、胡萝卜去皮擦细丝，放入水中浸泡去除多余淀粉"
  - "捞出挤干水分，加入鸡蛋、面粉、葱花、盐和白胡椒粉拌匀成糊，盖保鲜膜冷藏"
morning_steps:
  - "玉米汁打好后加入牛奶搅匀，加冰糖调味"
  - "不粘锅刷薄油，中火烧热"
  - "放入土豆丝胡萝卜糊，用铲子压平成薄饼状（约0.5cm厚）"
  - "中小火煎至底面金黄定型（约3分钟），翻面继续煎2-3分钟"
  - "煎好的饼可以切块，搭配玉米汁上桌"
notes: "玉米汁先打后加牛奶比一开始就加牛奶更香浓。土豆丝饼的关键是挤干水分，否则不脆。胡萝卜的甜味和土豆搭配，孩子很爱吃。"
