title: "牛肉芹菜小馄饨 + 卤蛋 + 牛奶"
type: breakfast
difficulty: medium
total_time: "前一晚包好 + 早上15分钟"
servings: 4
tools: [玻璃锅]
series: "馄饨+蛋+奶"
tags: [咸味, 牛肉, 馄饨, 主食]
ingredient_tags: ['牛肉', '芹菜', '馄饨皮', '鸡蛋', '牛奶', '紫菜']
ingredients:
  牛肉芹菜小馄饨:
    - name: 牛肉馅
      amount: 250g
      note: 补铁，助长个
    - name: 芹菜
      amount: 100g
      note: 切碎
    - name: 小馄饨皮
      amount: 1袋
    - name: 姜末
      amount: 少许
    - name: 宝宝酱油
      amount: 1大勺
    - name: 紫菜
      amount: 少许
    - name: 虾皮
      amount: 少许
    - name: 葱花
      amount: 少许
  配餐:
    - name: 卤蛋
      amount: 4个
      note: 前一晚卤好
    - name: 纯牛奶
      amount: 4杯
night_prep:
  - "牛肉馅+芹菜碎+姜末+酱油拌匀，包成小馄饨，冷冻或冷藏"
  - "鸡蛋煮熟剥壳，用宝宝酱油+少许冰糖小火卤入味，冷藏"
morning_steps:
  - "玻璃锅烧开水，下小馄饨煮至浮起再煮2分钟"
  - "碗中放紫菜、虾皮、葱花、几滴香油，冲入煮馄饨的热汤"
  - "馄饨捞入碗中，配卤蛋和热牛奶上桌"
notes: "牛肉补铁、芹菜补充纤维，馄饨前一晚包好冷冻，早上直接煮很省事。卤蛋比白煮蛋更香、孩子爱吃。"
