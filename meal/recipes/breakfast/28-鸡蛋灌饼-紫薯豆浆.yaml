title: "鸡蛋灌饼 + 紫薯豆浆"
type: breakfast
difficulty: medium
total_time: "25分钟（前一晚10分钟 + 早上15分钟）"
servings: 4
tools: [不粘煎锅, 破壁机]
series: "饼+豆浆"
tags: [咸味, 鸡蛋, 粗粮, 主食]
ingredient_tags: ['面粉', '鸡蛋', '紫薯', '黄豆', '生菜']
ingredients:
  鸡蛋灌饼:
    - name: 中筋面粉
      amount: 300g
    - name: 鸡蛋
      amount: 4个
      note: 灌入饼中
    - name: 生菜
      amount: 4片
    - name: 甜面酱
      amount: 适量
    - name: 盐
      amount: 少许
  紫薯豆浆:
    - name: 黄豆
      amount: 60g
      note: 提前泡发
    - name: 紫薯
      amount: 1个
      note: 去皮切块，粗粮补纤维
night_prep:
  - "面粉加温水和少许盐揉成光滑面团，醒发过夜（冷藏）"
  - "黄豆提前泡发，紫薯去皮切块冷藏"
morning_steps:
  - "黄豆+紫薯放破壁机加水800ml打豆浆（约20分钟）"
  - "面团分成4份擀薄，不粘锅小火烙至两面微黄、鼓起"
  - "饼鼓起时用筷子戳开口，灌入打散的鸡蛋液，翻面烙熟"
  - "刷甜面酱、夹生菜卷起，配紫薯豆浆上桌"
notes: "灌饼现做现吃最香，面团一定要提前醒发才好擀。紫薯豆浆颜色漂亮、粗粮补充膳食纤维，孩子爱喝。"
