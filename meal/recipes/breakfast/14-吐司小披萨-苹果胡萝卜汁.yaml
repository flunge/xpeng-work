title: "吐司小披萨 + 苹果胡萝卜汁"
type: breakfast
difficulty: easy
total_time: "20分钟（前一晚10分钟 + 早上10分钟）"
servings: 4
tools: [空气炸锅, 破壁机]
series: "吐司"
week: 2
day: friday
tags: [起司, 蔬菜, 水果, 孩子最爱]
ingredient_tags: ['吐司', '芝士', '玉米', '胡萝卜', '苹果', '鸡胸肉']
ingredients:
  吐司小披萨:
    - name: 吐司片
      amount: 4片
    - name: 番茄酱
      amount: 3大勺
    - name: 马苏里拉芝士碎
      amount: 适量
    - name: 玉米粒
      amount: 小半碗
    - name: 青豆
      amount: 小半碗
    - name: 鸡胸肉
      amount: 半块
      note: 约80g，煮熟切小丁，代替火腿丁
    - name: 小番茄
      amount: 4颗
      note: 切片
    - name: 鸡蛋
      amount: 2个
      note: 每个吐司打半个鸡蛋在芝士下
  苹果胡萝卜汁:
    - name: 苹果
      amount: 2个
      note: 去皮去核切块
    - name: 胡萝卜
      amount: 1根
      note: 去皮切小块
    - name: 蜂蜜
      amount: 少许
      optional: true
night_prep:
  - "玉米粒、青豆焯水1分钟，沥干冷藏"
  - "鸡胸肉冷水下锅煮8分钟，焖5分钟至熟透，捞出切小丁，放入保鲜盒冷藏"
  - "小番茄切片，放入保鲜盒冷藏"
  - "苹果和胡萝卜切块，分开放保鲜盒冷藏（苹果加柠檬汁防氧化）"
morning_steps:
  - "吐司片摆在铺了油纸的烤盘上，涂一层番茄酱"
  - "撒上玉米粒、青豆、鸡肉丁，铺上小番茄片"
  - "鸡蛋打散，每个吐司上淋少许蛋液，再撒上马苏里拉芝士碎"
  - "空气炸锅180℃预热3分钟，放入吐司烤6-8分钟至芝士融化金黄、蛋液凝固"
  - "同时将苹果块、胡萝卜块和200ml水放入破壁机打成果蔬汁（约1分钟）"
  - "披萨切块，搭配果蔬汁上桌"
notes: "这个早餐孩子可以参与放配料（他们超爱自己做披萨）。芝士拉丝的效果会让他们很兴奋。果蔬汁现打现喝，营养不流失。"
