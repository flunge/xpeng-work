title: "牛油果鸡蛋酱三明治 + 纯牛奶"
type: breakfast
difficulty: easy
total_time: "15分钟（前一晚10分钟 + 早上5分钟）"
servings: 4
tools: []
series: "三明治"
week: 2
day: sunday
tags: [水果, 蛋奶, 西式, 快手, 高蛋白]
ingredient_tags: ['牛油果', '鸡蛋', '吐司', '牛奶']
ingredients:
  牛油果鸡蛋酱三明治:
    - name: 牛油果
      amount: 2个
      note: 选熟透的，按压微软即可
    - name: 鸡蛋
      amount: 4个
    - name: 全麦吐司
      amount: 8片
    - name: 蛋黄酱
      amount: 1大勺
      note: 可用无糖酸奶+少许盐代替（酸奶3大勺+少许盐搅匀）；或直接不放，牛油果的油脂本身就有润口感
    - name: 柠檬汁
      amount: 少许
      note: 防止牛油果氧化变黑
    - name: 盐
      amount: 少许
    - name: 黑胡椒粉
      amount: 少许
  搭配:
    - name: 纯牛奶
      amount: 4杯
    - name: 樱桃番茄
      amount: 8颗
night_prep:
  - "鸡蛋煮熟（冷水下锅，水开后煮8分钟），捞出过冷水，去壳后放入保鲜盒冷藏"
  - "牛油果切半去核，果肉用勺子挖出放入碗中，淋柠檬汁拌匀，保鲜膜贴面冷藏"
  - "蛋黄酱、盐、黑胡椒调好放入小盒"
morning_steps:
  - "将熟鸡蛋和牛油果放入碗中，加入调好的蛋黄酱"
  - "用叉子将鸡蛋和牛油果一起碾碎拌匀成鸡蛋酱"
  - "吐司片烤一下或直接使用"
  - "将牛油果鸡蛋酱厚涂在吐司上，盖上另一片吐司"
  - "沿对角线切开，搭配小番茄和牛奶上桌"
notes: "牛油果富含健康不饱和脂肪酸，对小孩大脑发育很好。鸡蛋酱可以前一晚全部做好冷藏（多加柠檬汁防氧化），早上只需涂面包。"
