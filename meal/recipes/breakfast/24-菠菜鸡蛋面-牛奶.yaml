title: "菠菜鸡蛋面 + 纯牛奶"
type: breakfast
difficulty: easy
total_time: "15分钟（前一晚5分钟 + 早上10分钟）"
servings: 4
tools: [玻璃锅]
series: "汤面"
week: 3
day: thursday
tags: [汤面, 蔬菜, 蛋, 快手]
ingredient_tags: ['面条', '菠菜', '鸡蛋', '牛奶']
ingredients:
  菠菜鸡蛋面:
    - name: 细挂面
      amount: 200g
    - name: 菠菜
      amount: 1把
      note: 约150g，洗净切段
    - name: 鸡蛋
      amount: 4个
    - name: 葱花
      amount: 少许
    - name: 生抽
      amount: 1小勺
    - name: 盐
      amount: 少许
    - name: 香油
      amount: 几滴
  搭配:
    - name: 纯牛奶
      amount: 4杯
night_prep:
  - "菠菜洗净切段，放入保鲜盒冷藏"
  - "葱花切好，冷藏"
  - "汤底调味料（生抽、盐、香油）放入小碗"
morning_steps:
  - "玻璃锅烧开水，下挂面煮至八分熟（约3分钟）"
  - "放入菠菜，再煮30秒"
  - "汤碗中放入葱花、生抽、盐、香油，舀入煮面的热汤"
  - "将面条和菠菜捞入碗中"
  - "同时另一锅煎荷包蛋（或不粘锅煎），每个面碗放一个"
  - "搭配牛奶上桌"
notes: "一碗清汤面加荷包蛋，简单却满足。菠菜最后放，煮30秒即可，保持翠绿和营养。喜欢酸的可以加少许醋。"
batch_prep: ""
