title: "香菇滑鸡饭"
type: lunch_quick
difficulty: easy
total_time: "中午约25分钟"
servings: 2
serving_note: "一大一小（1成人+1儿童）"
tools: [电饭煲]
tags: [鸡腿肉, 香菇, 饭, 咸香]
ingredient_tags: ['鸡腿肉', '香菇', '大米']
ingredients:
  香菇滑鸡饭:
    - name: 去骨鸡腿肉
      amount: 150g
      note: 前晚切块，用生抽、蚝油、少许糖、淀粉、姜丝腌好冷藏
    - name: 干香菇
      amount: 3朵
      note: 前晚泡发切片
    - name: 胡萝卜
      amount: 1小段
      note: 切小丁配色
    - name: 大米
      amount: 1杯
    - name: 葱花
      amount: 少许
night_prep:
  - "鸡腿肉切块，加生抽、蚝油、少许糖、淀粉、姜丝抓匀冷藏"
  - "干香菇泡发切片；大米淘净"
noon_steps:
  - "大米加正常水量，铺上腌好的鸡肉、香菇、胡萝卜丁"
  - "电饭煲煮饭模式一键焖熟（约25分钟）"
  - "跳闸后焖5分钟，拌匀撒葱花"
notes: "电饭煲一键焖饭，中午几乎零看管；鸡肉香菇咸香微甜，蛋白+菌菇+主食一锅出，好消化孩子爱。"
