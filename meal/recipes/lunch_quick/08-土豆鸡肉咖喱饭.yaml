title: "土豆鸡肉咖喱饭"
type: lunch_quick
difficulty: easy
total_time: "中午约25分钟"
servings: 2
serving_note: "一大一小（1成人+1儿童）"
tools: [炖锅, 电饭煲]
tags: [鸡肉, 土豆, 咖喱, 米饭]
ingredient_tags: ['鸡腿肉', '土豆', '胡萝卜', '洋葱']
ingredients:
  土豆鸡肉咖喱饭:
    - name: 去骨鸡腿
      amount: 1块
      note: 前晚切块冷藏
    - name: 土豆
      amount: 1个
      note: 前晚切块泡水冷藏
    - name: 胡萝卜
      amount: 半根
      note: 切块
    - name: 洋葱
      amount: 1/4个
      note: 切块
    - name: 儿童咖喱块
      amount: 2小块
      note: 选不辣儿童咖喱
    - name: 热米饭
      amount: 2碗
night_prep:
  - "鸡腿切块冷藏；土豆切块泡水防氧化、胡萝卜洋葱切块装盒冷藏"
  - "电饭煲预约米饭"
noon_steps:
  - "锅中少许油炒香洋葱，下鸡块炒变色"
  - "加土豆、胡萝卜和没过食材的水，煮约12分钟至软"
  - "关小火放咖喱块搅至融化、汤汁浓稠，浇在米饭上"
notes: "儿童咖喱温和不辣，土豆胡萝卜炖软孩子好嚼。一锅炖几乎不用守。"
