title: "番茄虾仁蛋炒饭"
type: lunch_quick
difficulty: easy
total_time: "中午约20分钟"
servings: 2
serving_note: "一大一小（1成人+1儿童）"
tools: [炒锅]
tags: [虾仁, 番茄, 炒饭, 蛋]
ingredient_tags: ['虾仁', '番茄', '鸡蛋', '豌豆']
ingredients:
  番茄虾仁蛋炒饭:
    - name: 隔夜米饭
      amount: 2碗
      note: 前晚冷藏，炒饭更粒粒分明
    - name: 虾仁
      amount: 100g
      note: 前晚解冻、去虾线、少许盐和淀粉抓匀
    - name: 番茄
      amount: 1个
      note: 切小丁
    - name: 鸡蛋
      amount: 2个
    - name: 豌豆粒
      amount: 1小把
    - name: 玉米粒
      amount: 1小把
    - name: 葱花
      amount: 少许
    - name: 盐
      amount: 少许
night_prep:
  - "虾仁解冻去虾线，加少许盐、淀粉抓匀冷藏"
  - "米饭提前冷藏；豌豆玉米粒备好"
noon_steps:
  - "鸡蛋炒散盛出；虾仁下锅炒至变色盛出"
  - "番茄丁下锅炒软出汁，加豌豆玉米粒翻炒"
  - "倒入米饭炒散，回锅蛋和虾仁，加盐炒匀，撒葱花"
notes: "虾仁优质蛋白、番茄开胃，五彩配色孩子爱吃。隔夜饭是炒饭好吃的关键。"
