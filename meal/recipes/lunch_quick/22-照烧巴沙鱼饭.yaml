title: "照烧巴沙鱼饭"
type: lunch_quick
difficulty: easy
total_time: "中午约20分钟"
servings: 2
serving_note: "一大一小（1成人+1儿童）"
tools: [不粘煎锅, 电饭煲]
tags: [巴沙鱼, 照烧, 饭, 微甜咸香]
ingredient_tags: ['巴沙鱼', '大米', '西兰花']
ingredients:
  照烧巴沙鱼饭:
    - name: 巴沙鱼柳
      amount: 150g
      note: 前晚切厚片，厨房纸吸干水分冷藏
    - name: 照烧汁
      amount: 1.5大勺
      note: 宝宝酱油+味醂+少许糖自调亦可
    - name: 西兰花
      amount: 几小朵
      note: 前晚焯水
    - name: 玉米粒
      amount: 1小把
    - name: 大米
      amount: 1杯
      note: 前晚预约电饭煲
    - name: 熟白芝麻
      amount: 少许
night_prep:
  - "巴沙鱼切厚片吸干水冷藏；西兰花焯水冷藏；大米预约电饭煲"
noon_steps:
  - "不粘锅少许油，中火将巴沙鱼两面煎至微金黄"
  - "倒入照烧汁裹匀收浓，撒白芝麻"
  - "热米饭盛碗，铺鱼块、西兰花、玉米粒，淋锅内酱汁"
notes: "巴沙鱼无刺易熟，照烧微甜咸香是孩子最爱口味之一；煎制少油非油炸，蛋白+主食+蔬菜一碗齐。"
