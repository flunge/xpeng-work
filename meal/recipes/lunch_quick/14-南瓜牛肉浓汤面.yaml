title: "南瓜牛肉浓汤面"
type: lunch_quick
difficulty: easy
total_time: "中午约22分钟"
servings: 2
serving_note: "一大一小（1成人+1儿童）"
tools: [破壁机, 玻璃锅]
tags: [南瓜, 牛肉, 面]
ingredient_tags: ['牛肉末', '南瓜', '玉米']
ingredients:
  南瓜牛肉浓汤面:
    - name: 南瓜
      amount: 200g
      note: 前晚蒸熟冷藏
    - name: 牛肉末
      amount: 100g
      note: 前晚生抽淀粉抓匀冷藏
    - name: 儿童面条
      amount: 130g
    - name: 玉米粒
      amount: 1小把
    - name: 牛奶
      amount: 50ml
      note: 让汤更香浓
    - name: 盐
      amount: 少许
night_prep:
  - "南瓜去皮切块蒸熟冷藏"
  - "牛肉末加生抽、淀粉抓匀冷藏"
noon_steps:
  - "蒸南瓜加牛奶和一碗水破壁打成浓汤"
  - "锅中炒散牛肉末，倒入南瓜浓汤和玉米粒煮开"
  - "下面条煮约5分钟至软，加盐调味"
notes: "南瓜自然甜、富含胡萝卜素，破壁成浓汤孩子爱喝。牛肉补铁。"
