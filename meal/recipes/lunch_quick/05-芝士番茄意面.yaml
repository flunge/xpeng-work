title: "芝士番茄肉酱意面"
type: lunch_quick
difficulty: easy
total_time: "中午约25分钟"
servings: 2
serving_note: "一大一小（1成人+1儿童）"
tools: [玻璃锅, 不粘煎锅]
tags: [意面, 番茄, 芝士, 猪肉]
ingredient_tags: ['猪肉末', '番茄', '芝士', '洋葱']
ingredients:
  芝士番茄肉酱意面:
    - name: 儿童意面
      amount: 130g
      note: 螺丝/蝴蝶面孩子好夹
    - name: 猪肉末
      amount: 100g
      note: 前晚加生抽淀粉抓匀冷藏
    - name: 番茄
      amount: 2个
      note: 前晚去皮切丁
    - name: 番茄沙司
      amount: 2勺
    - name: 马苏里拉芝士
      amount: 1小把
    - name: 洋葱
      amount: 1/4个
      note: 切碎
    - name: 盐
      amount: 少许
night_prep:
  - "猪肉末加生抽、淀粉抓匀冷藏"
  - "番茄去皮切丁、洋葱切碎，装盒冷藏"
noon_steps:
  - "意面下开水煮8分钟至软，捞出"
  - "另锅炒香洋葱、肉末，加番茄丁炒出沙，加番茄沙司和少许水熬成肉酱"
  - "意面拌入肉酱，趁热撒马苏里拉芝士拌至融化"
notes: "番茄肉酱+拉丝芝士是孩子的最爱组合。意面可前晚煮好冷藏，中午只热酱更快。"
