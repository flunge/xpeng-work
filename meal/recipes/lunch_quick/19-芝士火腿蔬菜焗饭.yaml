title: "芝士火腿蔬菜焗饭"
type: lunch_quick
difficulty: easy
total_time: "中午约20分钟"
servings: 2
serving_note: "一大一小（1成人+1儿童）"
tools: [空气炸锅]
tags: [芝士, 火腿, 饭, 奶香]
ingredient_tags: ['芝士', '火腿', '大米']
ingredients:
  芝士火腿蔬菜焗饭:
    - name: 隔夜米饭
      amount: 1.5碗
      note: 前晚剩饭最佳
    - name: 无淀粉火腿
      amount: 60g
      note: 切丁，选配料干净的儿童火腿
    - name: 马苏里拉芝士
      amount: 40g
      note: 增奶香
    - name: 西兰花
      amount: 几小朵
      note: 前晚焯水切碎
    - name: 玉米粒
      amount: 1小把
    - name: 牛奶
      amount: 2大勺
      note: 拌饭增润
    - name: 盐
      amount: 少许
night_prep:
  - "西兰花焯水切碎、火腿切丁、玉米粒备好，冷藏"
noon_steps:
  - "米饭加牛奶、火腿丁、西兰花、玉米粒、少许盐拌匀，装入耐烤碗"
  - "铺满马苏里拉芝士"
  - "空气炸锅190℃烤8-10分钟至芝士融化金黄"
notes: "利用隔夜饭快手出品，芝士奶香拉丝孩子最爱；火腿蔬菜补蛋白蔬菜，空气炸锅无需看管。"
