title: "香菇鸡肉时蔬焖饭"
type: lunch_quick
difficulty: easy
total_time: "中午约25分钟（电饭煲）"
servings: 2
serving_note: "一大一小（1成人+1儿童）"
tools: [电饭煲]
tags: [鸡肉, 焖饭, 香菇]
ingredient_tags: ['鸡腿肉', '香菇', '胡萝卜', '玉米']
ingredients:
  香菇鸡肉时蔬焖饭:
    - name: 去骨鸡腿
      amount: 1块
      note: 前晚切丁，生抽蚝油糖腌好冷藏
    - name: 大米
      amount: 1.5杯
    - name: 香菇
      amount: 3朵
      note: 切丁
    - name: 胡萝卜
      amount: 半根
      note: 切丁
    - name: 玉米粒
      amount: 1小把
    - name: 生抽
      amount: 1勺
    - name: 葱花
      amount: 少许
night_prep:
  - "鸡腿切丁，加生抽、蚝油、少许糖腌好冷藏"
  - "香菇、胡萝卜切丁，与玉米装盒冷藏"
noon_steps:
  - "大米淘好加水（比平时略少），铺上鸡丁、香菇、胡萝卜、玉米"
  - "淋一勺生抽，按下电饭煲煮饭键"
  - "跳闸后焖5分钟，撒葱花拌匀"
notes: "电饭煲一键焖饭，米饭吸饱鸡肉香菇的鲜味，几乎零看护，中午最省事。"
