title: "照烧豆腐肉末饭"
type: lunch_quick
difficulty: easy
total_time: "中午约20分钟"
servings: 2
serving_note: "一大一小（1成人+1儿童）"
tools: [不粘煎锅, 电饭煲]
tags: [豆腐, 猪肉, 盖饭]
ingredient_tags: ['豆腐', '猪肉末', '豌豆']
ingredients:
  照烧豆腐肉末饭:
    - name: 老豆腐
      amount: 1块
      note: 约250g，切厚片
    - name: 猪肉末
      amount: 80g
      note: 前晚加生抽淀粉抓匀冷藏
    - name: 照烧汁
      amount: 适量
      note: 生抽1勺+蚝油半勺+糖半勺
    - name: 豌豆粒
      amount: 1小把
    - name: 热米饭
      amount: 2碗
    - name: 葱花
      amount: 少许
night_prep:
  - "猪肉末加生抽、淀粉抓匀冷藏；调好照烧汁"
  - "电饭煲预约米饭"
noon_steps:
  - "不粘锅刷薄油，豆腐片两面煎金黄盛出"
  - "同锅炒散肉末，加豌豆和照烧汁炒匀"
  - "豆腐回锅裹汁，连肉末浇在米饭上，撒葱花"
notes: "豆腐补钙、煎香孩子爱吃，照烧汁下饭。素蛋白和肉蛋白搭配营养更全。"
