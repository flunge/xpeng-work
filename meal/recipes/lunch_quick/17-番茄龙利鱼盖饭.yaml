title: "番茄龙利鱼盖饭"
type: lunch_quick
difficulty: easy
total_time: "中午约20分钟"
servings: 2
serving_note: "一大一小（1成人+1儿童）"
tools: [不粘煎锅, 电饭煲]
tags: [龙利鱼, 番茄, 饭, 酸甜]
ingredient_tags: ['龙利鱼', '番茄', '大米']
ingredients:
  番茄龙利鱼盖饭:
    - name: 龙利鱼柳
      amount: 150g
      note: 前晚切块，用少许盐、淀粉、蛋清抓匀冷藏
    - name: 番茄
      amount: 1个大
      note: 前晚去皮切丁
    - name: 番茄沙司
      amount: 1小勺
      note: 提酸甜
    - name: 豌豆粒
      amount: 1小把
      note: 配色增蔬菜
    - name: 大米
      amount: 1杯
      note: 前晚预约电饭煲
    - name: 盐
      amount: 少许
    - name: 水淀粉
      amount: 少许
night_prep:
  - "龙利鱼切块用盐、淀粉、蛋清抓匀，保鲜盒冷藏"
  - "番茄去皮切丁装盒；大米淘净预约电饭煲次日中午出饭"
noon_steps:
  - "锅热少许油，下番茄丁炒出沙，加番茄沙司和半碗水煮开"
  - "放入龙利鱼块与豌豆，中小火煮3-4分钟至鱼熟"
  - "加盐调味，少许水淀粉勾薄芡，浇在热米饭上"
notes: "龙利鱼无刺、肉嫩，番茄酸甜孩子接受度高；优质蛋白+DHA，一碗盖饭主食蛋白蔬菜齐全。"
