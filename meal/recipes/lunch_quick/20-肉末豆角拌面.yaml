title: "肉末豆角拌面"
type: lunch_quick
difficulty: easy
total_time: "中午约20分钟"
servings: 2
serving_note: "一大一小（1成人+1儿童）"
tools: [不粘煎锅, 玻璃锅]
tags: [猪肉末, 豆角, 面, 咸香]
ingredient_tags: ['猪肉末', '豆角', '面']
ingredients:
  肉末豆角拌面:
    - name: 猪肉末
      amount: 120g
      note: 前晚用生抽、少许糖、淀粉抓匀冷藏
    - name: 嫩豆角
      amount: 100g
      note: 前晚切小丁焯熟冷藏
    - name: 儿童面条
      amount: 130g
    - name: 生抽
      amount: 1小勺
    - name: 蚝油
      amount: 半小勺
    - name: 蒜末
      amount: 少许
    - name: 香油
      amount: 几滴
night_prep:
  - "肉末加生抽、少许糖、淀粉抓匀冷藏"
  - "豆角切小丁焯熟（确保熟透）装盒冷藏"
noon_steps:
  - "锅热少许油，下蒜末、肉末炒散变色"
  - "加豆角丁翻炒，调生抽、蚝油、半碗水煮成浓卤"
  - "另锅煮面5分钟捞出，浇肉末豆角卤，淋香油拌匀"
notes: "豆角必须焯熟炒透（防生豆角中毒）；肉末豆角咸香下饭，快手拌面主食蛋白蔬菜齐；不辣少油孩子友好。"
