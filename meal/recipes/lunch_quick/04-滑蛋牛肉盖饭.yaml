title: "滑蛋牛肉盖饭"
type: lunch_quick
difficulty: easy
total_time: "中午约20分钟"
servings: 2
serving_note: "一大一小（1成人+1儿童）"
tools: [不粘煎锅, 电饭煲]
tags: [牛肉, 蛋, 盖饭]
ingredient_tags: ['牛肉片', '鸡蛋', '洋葱']
ingredients:
  滑蛋牛肉盖饭:
    - name: 肥牛片
      amount: 120g
      note: 前晚解冻，生抽+糖+淀粉抓匀冷藏
    - name: 鸡蛋
      amount: 2个
      note: 加一勺牛奶打散更嫩滑
    - name: 洋葱
      amount: 1/4个
      note: 切丝
    - name: 热米饭
      amount: 2碗
    - name: 生抽
      amount: 1勺
    - name: 葱花
      amount: 少许
night_prep:
  - "肥牛片用生抽、糖、淀粉抓匀冷藏"
  - "洋葱切丝装盒；电饭煲预约米饭"
noon_steps:
  - "锅热少许油，洋葱丝炒香，下肥牛片炒至变色、加生抽调味盛出"
  - "蛋液加牛奶打散，锅中小火滑炒至半凝固"
  - "米饭上铺滑蛋和牛肉，撒葱花即可"
notes: "滑蛋嫩、牛肉补铁，洋葱的甜味中和不抢味。蛋加牛奶更嫩孩子爱吃。"
