title: "番茄豆腐肉末烩饭"
type: lunch_quick
difficulty: easy
total_time: "中午约20分钟"
servings: 2
serving_note: "一大一小（1成人+1儿童）"
tools: [不粘煎锅, 电饭煲]
tags: [豆腐, 猪肉末, 番茄, 饭, 酸甜]
ingredient_tags: ['嫩豆腐', '猪肉末', '番茄']
ingredients:
  番茄豆腐肉末烩饭:
    - name: 嫩豆腐
      amount: 半盒
      note: 约150g，切小块
    - name: 猪肉末
      amount: 100g
      note: 前晚用生抽、淀粉抓匀冷藏
    - name: 番茄
      amount: 1个大
      note: 前晚去皮切丁
    - name: 番茄沙司
      amount: 1小勺
    - name: 热米饭
      amount: 1.5碗
    - name: 盐
      amount: 少许
    - name: 葱花
      amount: 少许
    - name: 水淀粉
      amount: 少许
night_prep:
  - "肉末加生抽、淀粉抓匀冷藏；番茄去皮切丁装盒冷藏"
noon_steps:
  - "锅热少许油，下肉末炒散变色"
  - "加番茄丁炒出沙，放番茄沙司和半碗水煮开"
  - "下豆腐块轻推煮2分钟，加盐、水淀粉勾薄芡，撒葱花"
  - "浇在热米饭上即成烩饭"
notes: "豆腐+肉末双蛋白、番茄酸甜开胃，软嫩好消化特别适合孩子；一锅烩浇饭快手省事。"
