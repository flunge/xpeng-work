title: "蜜枣粽子（自己包）"
type: special
occasion: 端午节
difficulty: medium
total_time: "前一晚约3小时（泡米+包+煮）+ 早上10分钟回热"
servings: 4
tools: [炖锅, 蒸锅, 电饭煲]
series: "节日·主食"
tags: [端午, 糯米, 蜜枣, 甜粽]
ingredient_tags: ['糯米', '蜜枣', '粽叶']
ingredients:
  蜜枣粽子（约12-15个）:
    - name: 圆糯米
      amount: 500g
      note: 黏性足，比长糯米更适合包甜粽
    - name: 蜜枣
      amount: 15颗
      note: 给孩子吃建议提前去核，防噎
    - name: 干粽叶
      amount: 30片
      note: 一个粽子用2片，提前泡软煮过
    - name: 棉线（粽绳）
      amount: 1卷
      note: 也可用食品级棉线
    - name: 葡萄干
      amount: 1小把
      note: 可选，和蜜枣一起包增加风味
      optional: true
night_prep:
  - "圆糯米淘洗2-3遍，清水浸泡4小时以上（过夜更省事），泡好后沥干水分"
  - "干粽叶冷水泡软（2小时以上），下锅加水煮5-10分钟杀菌变软，捞出洗净沥干；棉线一起入锅煮软备用"
  - "蜜枣温水泡10分钟洗净，给孩子吃的提前去核"
  - "包粽子：取2片粽叶叠放，从中间折成漏斗状（底部不漏米），先放一层糯米，中间放2颗蜜枣，再盖一层糯米压实，把上方粽叶折回盖住、两侧收紧成三角，用棉线扎紧——这步全家一起包，孩子可以帮忙放枣、递叶子"
  - "煮粽子：包好的粽子冷水下炖锅，水要没过粽子，大火烧开后转小火煮2-2.5小时（中途加热水保持没过）；也可用电饭煲煮2小时"
  - "煮好后关火再焖30分钟，捞出沥干即可（吃不完冷藏保存）"
morning_steps:
  - "前一晚煮好的粽子放蒸锅，上汽后蒸8-10分钟回热（或电饭煲加热）"
  - "剪开棉线，剥开粽叶装盘，喜欢甜的可以蘸一点点白糖"
  - "搭配牛奶或果蔬汁，孩子1-2个即可，糯米不易消化别贪多"
notes: "自己包粽子是端午节很好的亲子活动，孩子参与放枣、收叶会很有成就感。给孩子吃的蜜枣务必去核防噎；糯米偏黏不好消化，小朋友控制在1-2个，配点蔬果和奶更均衡。煮的时间长，强烈建议前一晚包好煮好，早上只需蒸热。"
