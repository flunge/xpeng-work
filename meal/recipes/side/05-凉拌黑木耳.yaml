title: "凉拌黑木耳"
type: side
category: 凉菜
difficulty: easy
total_time: "15分钟（不含泡发）"
servings: 4
tools: [玻璃锅]
tags: [凉菜, 菌菇, 开胃]
ingredient_tags: ['木耳']
ingredients:
  凉拌黑木耳:
    - name: 干黑木耳
      amount: 20g
      note: 提前温水泡发
    - name: 胡萝卜
      amount: 少许
      note: 切丝点缀
    - name: 蒜
      amount: 2瓣
      note: 切末
    - name: 宝宝酱油
      amount: 1大勺
    - name: 香醋
      amount: 1小勺
    - name: 香油
      amount: 几滴
steps:
  - step: "泡发木耳撕小朵，玻璃锅烧开水焯2分钟，捞出过凉沥干"
    tool: 玻璃锅
  - step: "木耳加胡萝卜丝、蒜末、酱油、香醋、香油拌匀即可"
night_prep:
  - "干木耳提前一晚温水泡发，冷藏"
notes: "木耳口感爽脆、富含铁和膳食纤维；醋和香油用量少，清淡不刺激。"
