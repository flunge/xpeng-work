title: "清炒西葫芦"
type: side
category: 素菜
difficulty: easy
total_time: "10分钟"
servings: 4
tools: [炒锅]
tags: [蔬菜, 快手]
ingredient_tags: ['西葫芦']
ingredients:
  清炒西葫芦:
    - name: 西葫芦
      amount: 1个
      note: 切薄片
    - name: 蒜
      amount: 2瓣
      note: 切末
    - name: 盐
      amount: 少许
steps:
  - step: "炒锅倒少许油，下蒜末炒香"
    tool: 炒锅
  - step: "放入西葫芦片中火翻炒至变软出水，加少许盐调味即可"
    tool: 炒锅
night_prep:
  - "西葫芦洗净切片，蒜切末，冷藏（西葫芦切片后尽量当天炒，避免出水过多）"
notes: "西葫芦清甜软嫩，少油少盐，适合孩子。"
