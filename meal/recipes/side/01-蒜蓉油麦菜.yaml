title: "蒜蓉油麦菜"
type: side
category: 素菜
difficulty: easy
total_time: "10分钟"
servings: 4
tools: [炒锅]
tags: [蔬菜, 快手, 绿叶菜]
ingredient_tags: ['油麦菜']
ingredients:
  蒜蓉油麦菜:
    - name: 油麦菜
      amount: 1把
      note: 洗净切长段
    - name: 蒜
      amount: 3瓣
      note: 切末
    - name: 盐
      amount: 少许
steps:
  - step: "炒锅倒少许油，下一半蒜末炒香"
    tool: 炒锅
  - step: "放入油麦菜大火快炒至断生，加少许盐和剩余蒜末翻匀即可"
    tool: 炒锅
night_prep:
  - "油麦菜洗净切段沥干，蒜切末，分别冷藏"
notes: "大火快炒保持脆嫩，少油少盐，绿叶菜补充膳食纤维。"
