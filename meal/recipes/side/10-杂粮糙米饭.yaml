title: "杂粮糙米饭"
type: side
category: 粗粮
difficulty: easy
total_time: "电饭煲预约"
servings: 4
tools: [电饭煲]
tags: [粗粮, 主食, 杂粮]
ingredient_tags: ['糙米', '藜麦', '大米', '燕麦']
ingredients:
  杂粮糙米饭:
    - name: 大米
      amount: 1.5杯
    - name: 糙米
      amount: 0.5杯
      note: 提前泡1小时，粗粮
    - name: 藜麦
      amount: 2大勺
      note: 优质蛋白
    - name: 燕麦米
      amount: 2大勺
      optional: true
steps:
  - step: "大米、糙米、藜麦、燕麦米混合淘洗，加适量水"
    tool: 电饭煲
  - step: "按下煮饭键（或预约），焖好拌匀即可"
    tool: 电饭煲
night_prep:
  - "糙米提前泡1小时，与其他杂粮一起入电饭煲预约煮饭"
notes: "用杂粮饭替代部分白米饭，粗细搭配更科学；糙米藜麦补充B族维生素和蛋白。孩子接受度好（大米为主、杂粮为辅）。"
