title: "玉米山药羹"
type: side
category: 粗粮
difficulty: easy
total_time: "15分钟"
servings: 4
tools: [破壁机]
tags: [粗粮, 羹, 破壁, 奶香]
ingredient_tags: ['玉米', '山药', '牛奶']
ingredients:
  玉米山药羹:
    - name: 甜玉米粒
      amount: 150g
      note: 鲜玉米粒或冷冻玉米粒
    - name: 铁棍山药
      amount: 150g
      note: 去皮切块
    - name: 牛奶
      amount: 200ml
    - name: 冰糖
      amount: 少许
      note: 可省
steps:
  - step: "玉米粒、山药块加牛奶和300ml水倒入破壁机"
    tool: 破壁机
  - step: "选『浓汤/米糊』加热功能打约15分钟至浓稠温热，按口味加少许冰糖"
    tool: 破壁机
night_prep:
  - "山药去皮切块泡水冷藏（防氧化），玉米粒备好"
notes: "破壁一键出品，玉米山药双粗粮+奶香，绵密微甜孩子爱喝；补充膳食纤维与钙，当午餐的粗粮主食羹。"
