title: "蒸三色粗粮拼盘"
type: side
category: 粗粮
difficulty: easy
total_time: "25分钟"
servings: 4
tools: [蒸锅]
tags: [粗粮, 主食, 蒸, 无油]
ingredient_tags: ['玉米', '红薯', '紫薯']
ingredients:
  蒸三色粗粮拼盘:
    - name: 甜玉米
      amount: 2根
      note: 切段
    - name: 红薯
      amount: 1个
      note: 约200g，切块
    - name: 紫薯
      amount: 1个
      note: 约200g，切块
steps:
  - step: "玉米切段、红薯紫薯去皮切块，摆入蒸盘"
    tool: 蒸锅
  - step: "蒸锅水开后中火蒸20分钟至软糯，取出装盘"
    tool: 蒸锅
night_prep:
  - "红薯紫薯洗净（可不去皮），玉米切段，冷藏"
notes: "粗粮主食，和米饭/面（细粮）搭配做到粗细搭配；天然甜味无需调味，膳食纤维丰富、助消化，孩子当点心也爱吃。"
