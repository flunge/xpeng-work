title: "蜜汁烤南瓜块"
type: side
category: 粗粮
difficulty: easy
total_time: "20分钟"
servings: 4
tools: [空气炸锅]
tags: [粗粮, 主食, 烤, 微甜]
ingredient_tags: ['南瓜', '蜂蜜']
ingredients:
  蜜汁烤南瓜块:
    - name: 贝贝南瓜
      amount: 1个
      note: 约400g，去籽切1.5cm厚块，可带皮
    - name: 蜂蜜
      amount: 1小勺
      note: 1岁以上可用；出锅后刷
    - name: 熟白芝麻
      amount: 少许
steps:
  - step: "南瓜去籽切厚块，摆入空气炸锅（带皮更好拿取）"
    tool: 空气炸锅
  - step: "180℃烤15分钟至软糯，取出刷薄蜂蜜、撒白芝麻"
    tool: 空气炸锅
night_prep:
  - "南瓜洗净切块，保鲜盒冷藏"
notes: "空气炸锅无油版，南瓜天然甜、β-胡萝卜素丰富，蜂蜜提香孩子爱吃；粗粮主食，与米面搭配做到粗细搭配。"
